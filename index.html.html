// LOGIN
// ═══════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [nit, setNit] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    const nitLimpio = nit.replace(/\D/g, "");
    if (!nitLimpio || nitLimpio.length < 6) {
      setError("Ingresa un NIT válido (mínimo 6 dígitos)");
      return;
    }
    setLoading(true);
    try {
      const res = await fetch(CONFIG.LOGIN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nit: nitLimpio }),
      });
      if (!res.ok) throw new Error(`Error del servidor (${res.status})`);
      const data = await res.json();
      if (!data.valid) {
        setError(data.error || "Empresa no registrada. Verifica el NIT.");
        setLoading(false);
        return;
      }
      onLogin({ ...data, nit: nitLimpio });
    } catch (err) {
      setError(err.message);
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 420, background: "#fff", borderRadius: 16, padding: 32, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600, marginBottom: 6 }}>ASISTENTE OPUS 4.6</div>
          <div style={{ fontSize: 24, fontWeight: 800 }}>Causación de Facturas</div>
          <div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>Inicia sesión con el NIT de tu empresa</div>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: "block", fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 6, letterSpacing: "0.05em" }}>NIT DE LA EMPRESA</label>
            <input type="text" value={nit} onChange={(e) => setNit(e.target.value)} placeholder="Ej: 800456789" autoFocus disabled={loading}
              style={{ width: "100%", padding: "12px 14px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 15, fontFamily: "inherit", background: loading ? "#f8fafc" : "#fff" }} />
            <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 4 }}>Solo números, sin dígito de verificación</div>
          </div>
          {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
          <button type="submit" disabled={loading || !nit} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700, cursor: loading || !nit ? "not-allowed" : "pointer", background: loading || !nit ? "#94a3b8" : "#0f172a", color: "#fff", opacity: loading || !nit ? 0.6 : 1 }}>
            {loading ? <span><span className="spin">⟳</span> Verificando...</span> : "Ingresar"}
          </button>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════════
function fmt(n) { return "$" + (Number(n) || 0).toLocaleString("es-CO"); }
function dateFromInv(inv) {
  const d = inv.fecha_aprobacion || inv.processed_at || inv.causado_at;
  return d ? new Date(d) : null;
}
function dateStr(d) {
  if (!d) return "—";
  const dt = new Date(d);
  return dt.toLocaleDateString("es-CO", { day: "2-digit", month: "short", year: "numeric" });
}

// ═══════════════════════════════════════════════════════════════
// COMPONENTES
// ═══════════════════════════════════════════════════════════════
function Badge({ status }) {
  const S = {
    APROBADA: { bg: "#dcfce7", color: "#166534", label: "Aprobada" },
    APROBADA_AUTOMATICAMENTE: { bg: "#dbeafe", color: "#1e40af", label: "Auto-aprobada" },
    CAUSADA: { bg: "#f0fdf4", color: "#14532d", label: "✓ Causada" },
  };
  const s = S[status] || { bg: "#fef3c7", color: "#92400e", label: status };
  return <span style={{ background: s.bg, color: s.color, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{s.label}</span>;
}

function Risk({ level, score }) {
  const c = { bajo: "#16a34a", medio: "#f59e0b", alto: "#ef4444" }[level] || "#6b7280";
  return <span style={{ color: c, fontWeight: 600, fontSize: 12 }}>{score}/100 {(level || "").toUpperCase()}</span>;
}

function Field({ label, value, mono }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 13, color: "#0f172a", fontFamily: mono ? "'Courier New', monospace" : "inherit", wordBreak: mono ? "break-all" : "normal", lineHeight: 1.4 }}>{value || "—"}</div>
    </div>
  );
}

function SelectField({ label, value, opts, onChange, required }) {
  return (
    <div>
      <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 4 }}>{label} {required && <span style={{ color: "#ef4444" }}>*</span>}</div>
      <select value={value} onChange={(e) => onChange(e.target.value)} style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, background: "#fff", cursor: "pointer", boxSizing: "border-box" }}>
        <option value="">Seleccionar...</option>
        {opts.map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function TaxLine({ label, amount, percent, warn }) {
  if (!amount || amount <= 0) return null;
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 12, color: warn ? "#92400e" : "#475569" }}>
      <span>{label}{percent > 0 ? ` (${percent}%)` : ""}</span>
      <span style={{ fontWeight: 600 }}>{warn ? "-" : ""}{fmt(amount)}</span>
    </div>
  );
}

    setSaving(true);
    try { await onCausar(inv, { bodega, cuenta, notas }); }
    finally { setSaving(false); }

  return (
    <div className="fade-in" style={{ background: "#fff", padding: 20, borderTop: "1px solid #e2e8f0" }}>

            <div style={{ fontSize: 9, background: "#0369a1", color: "#fff", padding: "2px 8px", borderRadius: 10, fontWeight: 700 }}>{software || "Default"}</div>
          </div>
          <SelectField label="Bodega" value={bodega} opts={params.bodegas} onChange={setBodega} required />
          <div style={{ height: 10 }} />
          <SelectField label="Cuenta contable" value={cuenta} opts={params.cuentas} onChange={setCuenta} required />
          <div style={{ height: 10 }} />
          <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 4 }}>Notas adicionales</div>
          <textarea value={notas} onChange={(e) => setNotas(e.target.value)} placeholder="Observaciones..." rows={2} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
        </div>
      </div>

      <div style={{ marginTop: 16, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <button onClick={() => onDian(inv.cufe)} style={{ padding: "10px 18px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", background: dianOk ? "#dcfce7" : "#fff", color: dianOk ? "#166534" : "#0369a1", border: `1px solid ${dianOk ? "#86efac" : "#bae6fd"}` }}>
          {dianOk ? "✓ DIAN validada" : "Validar en DIAN"}
        </button>
        <button onClick={handleCausar} disabled={!canCausar} style={{ padding: "10px 24px", borderRadius: 8, fontSize: 13, fontWeight: 800, cursor: canCausar ? "pointer" : "not-allowed", background: canCausar ? "#0f172a" : "#94a3b8", color: "#fff", border: "none", opacity: canCausar ? 1 : 0.5 }}>
          {saving ? "Causando..." : "Causar factura"}
        </button>
        {!canCausar && !saving && <span style={{ fontSize: 11, color: "#f59e0b" }}>Selecciona bodega y cuenta para continuar</span>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// STAT CARD
// ═══════════════════════════════════════════════════════════════
function StatCard({ label, value, color, icon }) {
  return (
    <div style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", border: "1px solid #e2e8f0", flex: 1, minWidth: 140 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
        <span style={{ fontSize: 16 }}>{icon}</span>
        <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em" }}>{label}</div>
      </div>
      <div style={{ fontSize: 22, fontWeight: 800, color: color || "#0f172a" }}>{value}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function Dashboard({ session, onLogout }) {
  const [facturas, setFacturas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [filter, setFilter] = useState("PENDIENTES");
  const [search, setSearch] = useState("");
  const [causadas, setCausadas] = useState(new Set());
  const [dianValidadas, setDianValidadas] = useState(new Set());
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [credentials, setCredentials] = useState(null);

  const fetchFacturas = async () => {
    setLoading(true);
    setError("");
    try {
      const url = `${CONFIG.FACTURAS_URL}?nit=${encodeURIComponent(session.nit)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setFacturas(Array.isArray(data) ? data : (data ? [data] : []));
    } catch (e) {
      setError("No se pudieron cargar las facturas: " + e.message);
      setFacturas([]);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { fetchFacturas(); }, []);

  const handleDian = (cufe) => {
    if (cufe) {
      window.open(`${CONFIG.DIAN_URL}?DocumentKey=${cufe}`, "_blank");
      setDianValidadas((p) => new Set([...p, cufe]));
    }
  };

  const handleCausar = async (inv, extras) => {
    try {
      const payload = {
        ...inv, ...extras,
        dianValidada: dianValidadas.has(inv.cufe),
        usuario: session.correo || session.nit,
        empresa_nit: session.nit,
        software_contable: session.software_contable,
        causado_at: new Date().toISOString(),
      };
      const res = await fetch(CONFIG.CAUSAR_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setCausadas((p) => new Set([...p, inv.cufe]));
      alert(`✓ Factura ${inv.numero_factura} causada en ${session.software_contable}`);
      setExpanded(null);
    } catch (e) {
      alert("Error al causar: " + e.message);
    }
  };

  const isApproved = (f) => f.estado === "APROBADA" || f.estado === "APROBADA_AUTOMATICAMENTE";

  const filtered = useMemo(() => {
    return facturas.filter((f) => {
      const causada = causadas.has(f.cufe) || f.estado === "CAUSADA";
      if (filter === "PENDIENTES" && (causada || !isApproved(f))) return false;
      if (filter === "CAUSADAS" && !causada) return false;
      if (search) {
        const s = search.toLowerCase();
        if (![f.numero_factura, f.emisor, f.emisor_nit, f.cufe].some((v) => (v || "").toLowerCase().includes(s))) return false;
      }
      // Filtro de fechas
      const fechaInv = dateFromInv(f);
      if (dateFrom && fechaInv) {
        if (fechaInv < new Date(dateFrom)) return false;
      }
      if (dateTo && fechaInv) {
        const hasta = new Date(dateTo);
        hasta.setHours(23, 59, 59);
        if (fechaInv > hasta) return false;
      }
      return true;
    });
  }, [facturas, filter, search, dateFrom, dateTo, causadas]);

  const stats = useMemo(() => {
    const aprobadas = facturas.filter(isApproved);
    const pendientes = aprobadas.filter((f) => !causadas.has(f.cufe) && f.estado !== "CAUSADA");
    const causadasArr = facturas.filter((f) => f.estado === "CAUSADA" || causadas.has(f.cufe));
    const totalMonto = filtered.reduce((acc, f) => acc + (Number(f.total) || 0), 0);
    return {
      pendientes: pendientes.length,
      causadas: causadasArr.length,
      total: aprobadas.length,
      totalMonto,
    };
  }, [facturas, filtered, causadas]);

  const quickDate = (dias) => {
    const hasta = new Date();
    const desde = new Date();
    desde.setDate(desde.getDate() - dias);
    setDateFrom(desde.toISOString().slice(0, 10));
    setDateTo(hasta.toISOString().slice(0, 10));
  };

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0f172a, #1e293b)", padding: "18px 24px", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600, marginBottom: 4 }}>ASISTENTE OPUS 4.6</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>Causación de Facturas</div>
            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>NIT {session.nit} · {session.software_contable} · {session.correo}</div>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <button onClick={() => setShowSettings(true)} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: credentials ? "#10b981" : "transparent", color: credentials ? "#fff" : "#94a3b8", border: `1px solid ${credentials ? "#10b981" : "#334155"}` }}>
              {credentials ? "✓ APIs conectadas" : "⚙ Conectar APIs"}
            </button>
            <button onClick={onLogout} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer", background: "transparent", color: "#94a3b8", border: "1px solid #334155" }}>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "16px 24px" }}>
        {/* Stats Cards */}
        <div style={{ display: "flex", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
          <StatCard icon="⏳" label="PENDIENTES" value={stats.pendientes} color="#10b981" />
          <StatCard icon="✓" label="CAUSADAS" value={stats.causadas} color="#6366f1" />
          <StatCard icon="📄" label="TOTAL APROBADAS" value={stats.total} />
          <StatCard icon="💰" label="MONTO FILTRADO" value={fmt(stats.totalMonto)} />
        </div>

        {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: "#991b1b" }}>{error}</div>}

        {/* Filtros */}
        <div style={{ background: "#fff", borderRadius: 12, padding: 14, border: "1px solid #e2e8f0", marginBottom: 12 }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            {[
              { key: "PENDIENTES", label: `Pendientes (${stats.pendientes})` },
              { key: "CAUSADAS", label: `Causadas (${stats.causadas})` },
              { key: "ALL", label: `Todas (${stats.total})` },
            ].map((f) => (
              <button key={f.key} onClick={() => setFilter(f.key)} style={{
                padding: "7px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer",
                background: filter === f.key ? "#0f172a" : "#f8fafc",
                color: filter === f.key ? "#fff" : "#475569",
                border: `1px solid ${filter === f.key ? "#0f172a" : "#e2e8f0"}`,
              }}>{f.label}</button>
            ))}

            <div style={{ width: 1, height: 24, background: "#e2e8f0", margin: "0 4px" }}></div>

            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>📅 Desde:</span>
              <input type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12 }} />
              <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>Hasta:</span>
              <input type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12 }} />
              {(dateFrom || dateTo) && (
                <button onClick={() => { setDateFrom(""); setDateTo(""); }} style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid #e2e8f0", background: "#fff", fontSize: 11, cursor: "pointer", color: "#64748b" }}>✕</button>
              )}
            </div>

            <input type="text" placeholder="Buscar factura, emisor, CUFE..." value={search} onChange={(e) => setSearch(e.target.value)} style={{ marginLeft: "auto", padding: "7px 14px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, width: 240 }} />
            <button onClick={fetchFacturas} disabled={loading} style={{ padding: "7px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", background: "#fff", color: "#475569", border: "1px solid #e2e8f0" }}>
              {loading ? "⟳" : "↻"}
            </button>
          </div>

          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
            <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, alignSelf: "center" }}>ATAJOS:</span>
            {[
              { d: 7, l: "Últimos 7 días" },
              { d: 30, l: "Últimos 30 días" },
              { d: 90, l: "Últimos 3 meses" },
              { d: 365, l: "Último año" },
            ].map(q => (
              <button key={q.d} onClick={() => quickDate(q.d)} style={{ padding: "4px 10px", borderRadius: 12, border: "1px solid #e2e8f0", background: "#f8fafc", fontSize: 10, fontWeight: 600, cursor: "pointer", color: "#475569" }}>
                {q.l}
              </button>
            ))}
          </div>
        </div>

        {/* Lista */}
        {loading ? (
          <div style={{ textAlign: "center", padding: 60, color: "#94a3b8", fontSize: 14 }}><span className="spin">⟳</span> Cargando...</div>
        ) : filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: 60, color: "#94a3b8", fontSize: 14, background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0" }}>
            {facturas.length === 0 ? "No hay facturas aprobadas para tu empresa." : "No hay facturas que coincidan con los filtros."}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map((inv) => {
              const isCausada = causadas.has(inv.cufe) || inv.estado === "CAUSADA";
              const isExpanded = expanded === inv.cufe;
              const hasRet = (inv.retefuente > 0 || inv.reteiva > 0 || inv.reteica > 0);

              return (
                <div key={inv.cufe || inv.numero_factura} style={{ background: "#fff", borderRadius: 12, border: `1px solid ${isExpanded ? "#3b82f6" : "#e2e8f0"}`, overflow: "hidden", transition: "all 0.15s" }}>
                  <div onClick={() => setExpanded(isExpanded ? null : inv.cufe)} style={{ padding: "14px 20px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 8, background: isCausada ? "#dcfce7" : "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>
                      {isCausada ? "✓" : "📄"}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <div style={{ fontSize: 14, fontWeight: 700 }}>{inv.numero_factura}</div>
                        {inv.categoria && <span style={{ fontSize: 9, background: "#ede9fe", color: "#6d28d9", padding: "1px 6px", borderRadius: 10, fontWeight: 700 }}>{inv.categoria}</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "#64748b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {inv.emisor} · {dateStr(inv.fecha_aprobacion)}
                      </div>
                    </div>
                    <div style={{ textAlign: "right", minWidth: 110 }}>
                      <div style={{ fontSize: 14, fontWeight: 700 }}>{fmt(inv.total)}</div>
                      {hasRet && <div style={{ fontSize: 10, color: "#f59e0b" }}>con retenciones</div>}
                    </div>
                    <div style={{ minWidth: 90 }}><Risk level={inv.risk_level} score={inv.risk_score} /></div>
                    <div style={{ minWidth: 110 }}><Badge status={isCausada ? "CAUSADA" : inv.estado} /></div>
                    <div style={{ fontSize: 16, color: "#94a3b8", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</div>
                  </div>
                  {isExpanded && !isCausada && <InvoiceDetail inv={inv} onCausar={handleCausar} onDian={handleDian} dianOk={dianValidadas.has(inv.cufe)} software={session.software_contable} />}
                  {isExpanded && isCausada && (
                    <div style={{ background: "#f0fdf4", padding: 20, borderTop: "1px solid #dcfce7", textAlign: "center", color: "#166534", fontSize: 13 }}>
                      ✓ Esta factura ya fue causada
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {showSettings && (
        <ApiSettingsModal
          session={session}
          credentials={credentials}
          onClose={() => setShowSettings(false)}
          onSave={(creds) => { setCredentials(creds); setShowSettings(false); alert("✓ Credenciales guardadas"); }}
        />
      )}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  if (!session) return <LoginScreen onLogin={setSession} />;
  return <Dashboard session={session} onLogout={() => setSession(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
