<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const CONFIG = {
  LOGIN_URL:    "https://conaiassist.app.n8n.cloud/webhook/api/login",
  FACTURAS_URL: "https://conaiassist.app.n8n.cloud/webhook/api/facturas",
  CAUSAR_URL:   "https://conaiassist.app.n8n.cloud/webhook/causar-factura",
  ERP_PARAMS_URL: "https://conaiassist.app.n8n.cloud/webhook/api/erp-params",
  DIAN_VALIDATE_URL: "https://conaiassist.app.n8n.cloud/webhook/api/dian-validate",
  SAVE_CREDENTIALS_URL: "https://conaiassist.app.n8n.cloud/webhook/api/save-credentials",
  DELETE_CREDENTIALS_URL: "https://conaiassist.app.n8n.cloud/webhook/api/delete-credentials",
};

// Solo se guarda la URL sugerida del API por software, nada más
const SOFTWARE_API_URLS = {
  Siigo: "https://api.siigo.com",
  Alegra: "https://api.alegra.com",
  Loggro: "https://api.loggro.com",
  Mantis: "https://api.mantis.com.co",
  Cuenti: "https://api.cuenti.com",
  "World Office": "https://api.worldoffice.cloud",
  Odoo: "https://tuinstancia.odoo.com",
};

// ═══════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [nit, setNit] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    const nitLimpio = nit.replace(/\D/g, "");
    if (!nitLimpio || nitLimpio.length < 6) {
      setError("Ingresa un NIT válido (mínimo 6 dígitos)");
      return;
    }
    setLoading(true);
    try {
      const res = await fetch(CONFIG.LOGIN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nit: nitLimpio }),
      });
      if (!res.ok) throw new Error(`Error del servidor (${res.status})`);
      // Safe parse: si el webhook responde body vacío (ej: NIT inexistente sin alwaysOutputData),
      // lo tratamos como "empresa no encontrada" en vez de reventar con SyntaxError.
      const text = await res.text();
      const data = text ? JSON.parse(text) : { valid: false, error: "Empresa no registrada. Verifica el NIT." };
      if (!data.valid) {
        setError(data.error || "Empresa no registrada. Verifica el NIT.");
        setLoading(false);
        return;
      }
      onLogin({ ...data, nit: nitLimpio });
    } catch (err) {
      setError(err.message);
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 420, background: "#fff", borderRadius: 16, padding: 32, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600, marginBottom: 6 }}>ASISTENTE OPUS 4.6</div>
          <div style={{ fontSize: 24, fontWeight: 800 }}>Causación de Facturas</div>
          <div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>Inicia sesión con el NIT de tu empresa</div>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: "block", fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 6, letterSpacing: "0.05em" }}>NIT DE LA EMPRESA</label>
            <input type="text" value={nit} onChange={(e) => setNit(e.target.value)} placeholder="Ej: 800456789" autoFocus disabled={loading}
              style={{ width: "100%", padding: "12px 14px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 15, fontFamily: "inherit", background: loading ? "#f8fafc" : "#fff" }} />
            <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 4 }}>Solo números, sin dígito de verificación</div>
          </div>
          {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
          <button type="submit" disabled={loading || !nit} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700, cursor: loading || !nit ? "not-allowed" : "pointer", background: loading || !nit ? "#94a3b8" : "#0f172a", color: "#fff", opacity: loading || !nit ? 0.6 : 1 }}>
            {loading ? <span><span className="spin">⟳</span> Verificando...</span> : "Ingresar"}
          </button>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MODAL DE CONFIGURACIÓN DE APIs
// ═══════════════════════════════════════════════════════════════
function ApiSettingsModal({ session, credentials, onSave, onClose, onDelete }) {
  const [dianUrl, setDianUrl] = useState(credentials?.dianUrl || "");
  const [erpKey, setErpKey] = useState(credentials?.erpKey || "");
  const [erpUser, setErpUser] = useState(credentials?.erpUser || "");

  const [deleting, setDeleting] = useState(false);

  const handleSave = async () => {
    setSaving(true);
    await onSave({ dianUrl, erpKey, erpUser, erpUrl });
    setSaving(false);
  };

  const handleDelete = async () => {
    if (!confirm("¿Seguro que quieres olvidar las credenciales guardadas? Tendrás que volver a ingresarlas la próxima vez.")) return;
    setDeleting(true);
    await onDelete();
    setDeleting(false);
  };

  // "Hace X tiempo" a partir del ISO de updatedAt
  const relativeTime = (iso) => {
    if (!iso) return null;
    const diff = Date.now() - new Date(iso).getTime();
    if (isNaN(diff)) return null;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "hace un momento";
    if (mins < 60) return `hace ${mins} min`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `hace ${hrs} h`;
    const days = Math.floor(hrs / 24);
    if (days < 30) return `hace ${days} día${days > 1 ? "s" : ""}`;
    const months = Math.floor(days / 30);
    return `hace ${months} mes${months > 1 ? "es" : ""}`;
  };
  const lastUpdated = relativeTime(credentials?.updatedAt);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="fade-in" style={{ background: "#fff", borderRadius: 16, padding: 32, maxWidth: 560, width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 25px 80px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600 }}>CONFIGURACIÓN DE CREDENCIALES</div>
            <div style={{ fontSize: 18, fontWeight: 800, marginTop: 4 }}>Conectar APIs externas</div>
          </div>
          <button onClick={onClose} style={{ background: "#f1f5f9", border: "none", borderRadius: 8, width: 32, height: 32, fontSize: 16, cursor: "pointer", color: "#64748b" }}>×</button>
        </div>

        <div style={{ background: "#f8fafc", borderRadius: 10, padding: 16, marginBottom: 16, border: "1px solid #e2e8f0" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#0369a1", marginBottom: 10, letterSpacing: "0.1em" }}>🏛 PORTAL DIAN</div>
          <div style={{ fontSize: 11, color: "#64748b", marginBottom: 12 }}>Pega el enlace de validación de la DIAN de tu empresa. Se usará para validar automáticamente cada factura.</div>
          <div>
            <label style={{ display: "block", fontSize: 10, color: "#475569", fontWeight: 600, marginBottom: 4 }}>URL DE VALIDACIÓN DIAN</label>
            <input type="text" value={dianUrl} onChange={(e) => setDianUrl(e.target.value)} placeholder="https://catalogo-vpfe.dian.gov.co/..." style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, fontFamily: "monospace" }} />
          </div>
        </div>

        <div style={{ background: "#f0f9ff", borderRadius: 10, padding: 16, marginBottom: 20, border: "1px solid #bae6fd" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#0369a1", marginBottom: 10, letterSpacing: "0.1em" }}>⚙ API DE {session.software_contable?.toUpperCase()}</div>
          <div style={{ fontSize: 11, color: "#64748b", marginBottom: 12 }}>Al conectar el software contable, las opciones de causación (bodegas, cuentas, centros de costo) se cargarán automáticamente.</div>
          <div style={{ marginBottom: 10 }}>
            <label style={{ display: "block", fontSize: 10, color: "#475569", fontWeight: 600, marginBottom: 4 }}>URL DEL API</label>
            <input type="text" value={erpUrl} onChange={(e) => setErpUrl(e.target.value)} placeholder="https://api.siigo.com" style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, fontFamily: "monospace" }} />
          </div>
          <div style={{ marginBottom: 10 }}>
            <label style={{ display: "block", fontSize: 10, color: "#475569", fontWeight: 600, marginBottom: 4 }}>USUARIO / EMAIL</label>
            <input type="text" value={erpUser} onChange={(e) => setErpUser(e.target.value)} placeholder="tu@empresa.com" style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13 }} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 10, color: "#475569", fontWeight: 600, marginBottom: 4 }}>API KEY / TOKEN</label>
            <input type="password" value={erpKey} onChange={(e) => setErpKey(e.target.value)} placeholder="••••••••••••••••" style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, fontFamily: "monospace" }} />
          </div>
        </div>

        <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: "#92400e" }}>
          🔒 Las credenciales se guardan encriptadas en n8n y nunca salen de tu cuenta.
        </div>

        {lastUpdated && (
          <div style={{ fontSize: 11, color: "#64748b", marginBottom: 16, textAlign: "right", fontStyle: "italic" }}>
            Última actualización: {lastUpdated}
          </div>
        )}

        <div style={{ display: "flex", gap: 10, justifyContent: "space-between", alignItems: "center" }}>
          {credentials?.erpKey ? (
            <button onClick={handleDelete} disabled={deleting || saving} style={{ padding: "10px 16px", borderRadius: 8, border: "1px solid #fecaca", background: "#fff", fontSize: 12, fontWeight: 600, cursor: deleting ? "not-allowed" : "pointer", color: "#b91c1c", opacity: deleting ? 0.6 : 1 }}>
              {deleting ? "Olvidando..." : "Olvidar credenciales"}
            </button>
          ) : <span />}
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={onClose} style={{ padding: "10px 18px", borderRadius: 8, border: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", color: "#475569" }}>Cancelar</button>
            <button onClick={handleSave} disabled={saving || deleting} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: "#0f172a", color: "#fff", fontSize: 13, fontWeight: 700, cursor: saving ? "not-allowed" : "pointer", opacity: saving ? 0.6 : 1 }}>
              {saving ? "Guardando..." : "Guardar credenciales"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════════
function fmt(n) { return "$" + (Number(n) || 0).toLocaleString("es-CO"); }
function dateFromInv(inv) {
  const d = inv.fecha_aprobacion || inv.processed_at || inv.causado_at;
  return d ? new Date(d) : null;
}
function dateStr(d) {
  if (!d) return "—";
  const dt = new Date(d);
  return dt.toLocaleDateString("es-CO", { day: "2-digit", month: "short", year: "numeric" });
}

// ═══════════════════════════════════════════════════════════════
// COMPONENTES
// ═══════════════════════════════════════════════════════════════
function Badge({ status }) {
  const S = {
    APROBADA: { bg: "#dcfce7", color: "#166534", label: "Aprobada" },
    APROBADA_AUTOMATICAMENTE: { bg: "#dbeafe", color: "#1e40af", label: "Auto-aprobada" },
    CAUSADA: { bg: "#f0fdf4", color: "#14532d", label: "✓ Causada" },
  };
  const s = S[status] || { bg: "#fef3c7", color: "#92400e", label: status };
  return <span style={{ background: s.bg, color: s.color, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{s.label}</span>;
}

function Risk({ level, score }) {
  const c = { bajo: "#16a34a", medio: "#f59e0b", alto: "#ef4444" }[level] || "#6b7280";
  return <span style={{ color: c, fontWeight: 600, fontSize: 12 }}>{score}/100 {(level || "").toUpperCase()}</span>;
}

}

        <option value="">{opts.length === 0 ? (emptyMsg || "Conecta el API para ver opciones") : "Seleccionar..."}</option>
        {opts.map((o) => <option key={typeof o === 'string' ? o : o.id} value={typeof o === 'string' ? o : o.id}>{typeof o === 'string' ? o : o.label}</option>)}

}

      <span style={{ fontWeight: 600 }}>{warn ? "-" : ""}{fmt(amount)}</span>

}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, fontSize: 12 }}>
        <div>
          <div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>CATEGORÍA IA</div>
          <div style={{ fontWeight: 600 }}>{inv.categoria || "—"}</div>
          {inv.subcategoria && <div style={{ fontSize: 11, color: "#6d28d9" }}>{inv.subcategoria}</div>}
        </div>
        <div>
          <div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>TIPO CONTABLE</div>
          <div style={{ fontWeight: 600 }}>{inv.tipo_contable || "—"}</div>
        </div>
        <div>
          <div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>DEPARTAMENTO SUGERIDO</div>
          <div style={{ fontWeight: 600 }}>{inv.departamento_asignado || "—"}</div>
        </div>
        <div>
          <div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>NIVEL DE RIESGO</div>
          <div><Risk level={inv.risk_level} score={inv.risk_score} /></div>
        </div>

      {inv.tipo_contable_razon && (

// ═══════════════════════════════════════════════════════════════
// VALIDACIÓN DIAN AUTOMÁTICA (invisible)
// ═══════════════════════════════════════════════════════════════
function DianStatus({ cufe, credentials }) {
  const [status, setStatus] = useState("idle"); // idle, checking, valid, invalid, no_creds
  const [detail, setDetail] = useState("");

  useEffect(() => {
    if (!credentials?.dianUrl) {
      setStatus("no_creds");
      return;
    }
    if (!cufe) return;

    setStatus("checking");
    fetch(CONFIG.DIAN_VALIDATE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cufe, dianUrl: credentials.dianUrl }),
    })
      .then(r => r.ok ? r.json() : Promise.reject(new Error("HTTP " + r.status)))
      .then(data => {
        setStatus(data.valid ? "valid" : "invalid");
        setDetail(data.message || "");
      })
      .catch(() => {
        setStatus("invalid");
        setDetail("No se pudo validar");
      });
  }, [cufe, credentials?.dianUrl]);

  if (status === "no_creds") {
    return (
      <div style={{ padding: "8px 14px", borderRadius: 8, background: "#fef3c7", border: "1px solid #fbbf24", fontSize: 12, color: "#92400e" }}>
        ⚠ Conecta el API DIAN para validación automática
      </div>
    );
  }

  if (status === "checking") {
    return (
      <div style={{ padding: "8px 14px", borderRadius: 8, background: "#f8fafc", border: "1px solid #e2e8f0", fontSize: 12, color: "#64748b" }}>
        <span className="spin">⟳</span> Validando en DIAN...
      </div>
    );
  }

  if (status === "valid") {
    return (
      <div style={{ padding: "8px 14px", borderRadius: 8, background: "#dcfce7", border: "1px solid #86efac", fontSize: 12, color: "#166534", fontWeight: 600 }}>
        ✓ Validada por DIAN {detail && `· ${detail}`}
      </div>
    );
  }

  return (
    <div style={{ padding: "8px 14px", borderRadius: 8, background: "#fef2f2", border: "1px solid #fecaca", fontSize: 12, color: "#991b1b" }}>
      ✗ No validada {detail && `· ${detail}`}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// DETALLE DE FACTURA
// ═══════════════════════════════════════════════════════════════
function InvoiceDetail({ inv, onCausar, credentials, erpParams, erpLoading }) {
  const [selected1, setSelected1] = useState("");
  const [selected2, setSelected2] = useState("");
  const [selected3, setSelected3] = useState("");
  const [notas, setNotas] = useState("");
  const [saving, setSaving] = useState(false);
  
  const retenciones = inv.retefuente > 0 || inv.reteiva > 0 || inv.reteica > 0;
  const hasErp = credentials?.erpKey && erpParams;
  
  // Campos dinámicos del ERP
  const erpFields = erpParams?.fields || [];
  const values = [selected1, selected2, selected3];
  const setters = [setSelected1, setSelected2, setSelected3];
  const requiredFields = erpFields.filter((f, i) => f.required).map((f, i) => values[i]);
  const canCausar = hasErp && requiredFields.every(v => v) && !saving;

  const handleCausar = async () => {
    setSaving(true);
    try {
      const extras = { notas };
      erpFields.forEach((f, i) => {
        if (values[i]) extras[f.key] = values[i];
      });
      await onCausar(inv, extras);
    }
    finally { setSaving(false); }
  };

  return (
    <div className="fade-in" style={{ background: "#fff", padding: 20, borderTop: "1px solid #e2e8f0" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 16 }}>
        <Field label="RECEPTOR" value={inv.receptor} />
        <Field label="NIT RECEPTOR" value={inv.receptor_nit} />
        <Field label="MEDIO DE PAGO" value={inv.medio_pago || "No especificado"} />
        <Field label="FECHA APROBACIÓN" value={dateStr(inv.fecha_aprobacion)} />
        <Field label="MONEDA" value={inv.moneda || "COP"} />
        <Field label="EMISOR NIT" value={inv.emisor_nit} />
      </div>

      <Field label="CUFE" value={inv.cufe} mono />

      {/* Validación DIAN automática */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 6 }}>VALIDACIÓN DIAN</div>
        <DianStatus cufe={inv.cufe} credentials={credentials} />
      </div>

      <AiInsights inv={inv} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div style={{ background: "#f8fafc", borderRadius: 10, padding: 14, border: "1px solid #e2e8f0" }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "0.1em", marginBottom: 10 }}>DESGLOSE TRIBUTARIO</div>
          <TaxLine label="Subtotal" amount={inv.subtotal} />
          <TaxLine label="IVA" amount={inv.iva} percent={inv.iva_porcentaje} />
          {inv.inc > 0 && <TaxLine label="INC" amount={inv.inc} />}
          <div style={{ borderTop: "2px solid #0f172a", marginTop: 6, paddingTop: 6, display: "flex", justifyContent: "space-between", fontSize: 14, fontWeight: 800 }}>
            <span>TOTAL</span><span>{fmt(inv.total)}</span>
          </div>
          {retenciones && (
            <div style={{ marginTop: 10, padding: 10, background: "#fffbeb", borderRadius: 8, borderLeft: "3px solid #f59e0b" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#92400e", letterSpacing: "0.08em", marginBottom: 4 }}>RETENCIONES</div>
              <TaxLine label="ReteFuente" amount={inv.retefuente} percent={inv.retefuente_porcentaje} warn />
              <TaxLine label="ReteIVA" amount={inv.reteiva} percent={inv.reteiva_porcentaje} warn />
              <TaxLine label="ReteICA" amount={inv.reteica} percent={inv.reteica_porcentaje} warn />
              <div style={{ borderTop: "2px solid #f59e0b", marginTop: 6, paddingTop: 6, display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 800 }}>
                <span>NETO A PAGAR</span><span>{fmt(inv.total_a_pagar || inv.total)}</span>
              </div>
            </div>
          )}
        </div>

        <div style={{ background: hasErp ? "#f0f9ff" : "#fef3c7", borderRadius: 10, padding: 14, border: `1px solid ${hasErp ? "#bae6fd" : "#fbbf24"}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: hasErp ? "#0369a1" : "#92400e", letterSpacing: "0.1em" }}>DATOS DE CAUSACIÓN</div>
          </div>
          
          {erpLoading && (
            <div style={{ padding: 12, background: "#fff", borderRadius: 6, fontSize: 12, color: "#64748b", textAlign: "center" }}>
              <span className="spin">⟳</span> Cargando parámetros del ERP...
            </div>
          )}
          
          {!hasErp && !erpLoading && (
            <div style={{ padding: 12, background: "#fff", borderRadius: 6, fontSize: 12, color: "#92400e" }}>
              ⚠ Conecta el API de tu software contable para ver las opciones de causación
            </div>
          )}

          {hasErp && !erpLoading && erpFields.length === 0 && (
            <div style={{ padding: 12, background: "#fff", borderRadius: 6, fontSize: 12, color: "#64748b" }}>
              No se encontraron parámetros en el ERP
            </div>
          )}

          {hasErp && !erpLoading && erpFields.slice(0, 3).map((f, i) => (
            <div key={f.key} style={{ marginBottom: 10 }}>
              <SelectField label={f.label} value={values[i]} opts={f.options || []} onChange={setters[i]} required={f.required} />
            </div>
          ))}

          <div>
            <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 4 }}>Notas adicionales</div>
            <textarea value={notas} onChange={(e) => setNotas(e.target.value)} placeholder="Observaciones..." rows={2} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
          </div>
        </div>
      </div>

      <div style={{ marginTop: 16, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <button onClick={handleCausar} disabled={!canCausar} style={{ padding: "10px 24px", borderRadius: 8, fontSize: 13, fontWeight: 800, cursor: canCausar ? "pointer" : "not-allowed", background: canCausar ? "#0f172a" : "#94a3b8", color: "#fff", border: "none", opacity: canCausar ? 1 : 0.5 }}>
          {saving ? "Causando..." : "Causar factura"}
        </button>
        {!hasErp && <span style={{ fontSize: 11, color: "#92400e" }}>Conecta tu API ERP para causar</span>}
      </div>
    </div>
  );
}

function StatCard({ label, value, color, icon }) {
  return (
    <div style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", border: "1px solid #e2e8f0", flex: 1, minWidth: 140 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
        <span style={{ fontSize: 16 }}>{icon}</span>
        <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em" }}>{label}</div>
      </div>
      <div style={{ fontSize: 22, fontWeight: 800, color: color || "#0f172a" }}>{value}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// EMPTY STATES
// ═══════════════════════════════════════════════════════════════
function EmptyState({ icon, title, message }) {
  return (
    <div style={{ textAlign: "center", padding: "80px 20px", background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>{icon}</div>
      <div style={{ fontSize: 16, fontWeight: 700, color: "#334155", marginBottom: 8 }}>{title}</div>
      <div style={{ fontSize: 13, color: "#94a3b8", maxWidth: 400, margin: "0 auto", lineHeight: 1.5 }}>{message}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function Dashboard({ session, onLogout }) {
  const [facturas, setFacturas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [filter, setFilter] = useState("PENDIENTES");
  const [search, setSearch] = useState("");
  const [causadas, setCausadas] = useState(new Set());
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  // Credenciales: inicializar desde session si el login las trajo guardadas,
  // si no null (usuario tendrá que conectar manualmente)
  const [credentials, setCredentials] = useState(
    session.credentials && session.credentials.erpKey ? session.credentials : null
  );
  const [erpParams, setErpParams] = useState(null);
  const [erpLoading, setErpLoading] = useState(false);

  const fetchFacturas = async () => {
    setLoading(true);
    setError("");
    try {
      const url = `${CONFIG.FACTURAS_URL}?nit=${encodeURIComponent(session.nit)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      // Safe parse: webhook puede devolver body vacío cuando no hay facturas.
      const text = await res.text();
      const data = text ? JSON.parse(text) : [];
      setFacturas(Array.isArray(data) ? data : (data ? [data] : []));
    } catch (e) {
      setError("No se pudieron cargar las facturas: " + e.message);
      setFacturas([]);
    } finally {
      setLoading(false);
    }
  };

  const fetchErpParams = async (creds) => {
    if (!creds?.erpKey || !creds?.erpUrl) {
      setErpParams(null);
      return;
    }
    setErpLoading(true);
    try {
      const res = await fetch(CONFIG.ERP_PARAMS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          software: session.software_contable,
          erpUrl: creds.erpUrl,
          erpUser: creds.erpUser,
          erpKey: creds.erpKey,
          empresa_nit: session.nit,
        }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setErpParams(data);
    } catch (e) {
      console.error("No se pudieron cargar los parámetros del ERP:", e);
      setErpParams({ fields: [] });
    } finally {
      setErpLoading(false);
    }
  };

  useEffect(() => { fetchFacturas(); }, []);
  useEffect(() => { if (credentials) fetchErpParams(credentials); }, [credentials]);

  const handleCausar = async (inv, extras) => {
    try {
      const payload = {
        ...inv, ...extras,
        usuario: session.correo || session.nit,
        empresa_nit: session.nit,
        software_contable: session.software_contable,
        credentials: credentials,
        causado_at: new Date().toISOString(),
      };
      const res = await fetch(CONFIG.CAUSAR_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const data = text ? JSON.parse(text) : { success: false, error: 'Respuesta vacía' };
      if (!data.success) throw new Error(data.error || 'Error desconocido');
      setCausadas((p) => new Set([...p, inv.cufe]));
      alert(`✓ Factura ${inv.numero_factura} causada en ${session.software_contable}`);
      setExpanded(null);
    } catch (e) {
      alert("Error al causar: " + e.message);
    }
  };

  const isApproved = (f) => f.estado === "APROBADA" || f.estado === "APROBADA_AUTOMATICAMENTE";

  const filtered = useMemo(() => {
    return facturas.filter((f) => {
      const causada = causadas.has(f.cufe) || f.estado === "CAUSADA";
      if (filter === "PENDIENTES" && (causada || !isApproved(f))) return false;
      if (filter === "CAUSADAS" && !causada) return false;
      if (search) {
        const s = search.toLowerCase();
        if (![f.numero_factura, f.emisor, f.emisor_nit, f.cufe].some((v) => (v || "").toLowerCase().includes(s))) return false;
      }
      const fechaInv = dateFromInv(f);
      if (dateFrom && fechaInv) {
        if (fechaInv < new Date(dateFrom)) return false;
      }
      if (dateTo && fechaInv) {
        const hasta = new Date(dateTo);
        hasta.setHours(23, 59, 59);
        if (fechaInv > hasta) return false;
      }
      return true;
    });
  }, [facturas, filter, search, dateFrom, dateTo, causadas]);

  const stats = useMemo(() => {
    const aprobadas = facturas.filter(isApproved);
    const pendientes = aprobadas.filter((f) => !causadas.has(f.cufe) && f.estado !== "CAUSADA");
    const causadasArr = facturas.filter((f) => f.estado === "CAUSADA" || causadas.has(f.cufe));
    const totalMonto = filtered.reduce((acc, f) => acc + (Number(f.total) || 0), 0);
    return {
      pendientes: pendientes.length,
      causadas: causadasArr.length,
      total: aprobadas.length,
      totalMonto,
    };
  }, [facturas, filtered, causadas]);

  const quickDate = (dias) => {
    const hasta = new Date();
    const desde = new Date();
    desde.setDate(desde.getDate() - dias);
    setDateFrom(desde.toISOString().slice(0, 10));
    setDateTo(hasta.toISOString().slice(0, 10));
  };

  // Si no hay facturas para esta empresa
  const noFacturasForEmpresa = !loading && !error && facturas.length === 0;

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ background: "linear-gradient(135deg, #0f172a, #1e293b)", padding: "18px 24px", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600, marginBottom: 4 }}>ASISTENTE OPUS 4.6</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>Causación de Facturas</div>
            {session.empresa && session.empresa !== session.correo && (
              <div style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 600, marginTop: 6 }}>
                {session.empresa}
              </div>
            )}
            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>NIT {session.nit} · {session.software_contable} · {session.correo}</div>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <button onClick={() => setShowSettings(true)} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: credentials ? "#10b981" : "transparent", color: credentials ? "#fff" : "#94a3b8", border: `1px solid ${credentials ? "#10b981" : "#334155"}` }}>
              {credentials ? "✓ APIs conectadas" : "⚙ Conectar APIs"}
            </button>
            <button onClick={onLogout} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer", background: "transparent", color: "#94a3b8", border: "1px solid #334155" }}>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "16px 24px" }}>
        {noFacturasForEmpresa ? (
          <div style={{ marginTop: 40 }}>
            <EmptyState 
              icon="📄" 
              title="No se han procesado facturas" 
              message="Cuando lleguen facturas electrónicas aprobadas a tu correo, aparecerán aquí para causarlas en tu software contable." 
            />
          </div>
        ) : (
          <React.Fragment>
            <div style={{ display: "flex", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
              <StatCard icon="⏳" label="PENDIENTES" value={stats.pendientes} color="#10b981" />
              <StatCard icon="✓" label="CAUSADAS" value={stats.causadas} color="#6366f1" />
              <StatCard icon="📄" label="TOTAL APROBADAS" value={stats.total} />
              <StatCard icon="💰" label="MONTO FILTRADO" value={fmt(stats.totalMonto)} />
            </div>

            {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: "#991b1b" }}>{error}</div>}

            <div style={{ background: "#fff", borderRadius: 12, padding: 14, border: "1px solid #e2e8f0", marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                {[
                  { key: "PENDIENTES", label: `Pendientes (${stats.pendientes})` },
                  { key: "CAUSADAS", label: `Causadas (${stats.causadas})` },
                  { key: "ALL", label: `Todas (${stats.total})` },
                ].map((f) => (
                  <button key={f.key} onClick={() => setFilter(f.key)} style={{
                    padding: "7px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer",
                    background: filter === f.key ? "#0f172a" : "#f8fafc",
                    color: filter === f.key ? "#fff" : "#475569",
                    border: `1px solid ${filter === f.key ? "#0f172a" : "#e2e8f0"}`,
                  }}>{f.label}</button>
                ))}

                <div style={{ width: 1, height: 24, background: "#e2e8f0", margin: "0 4px" }}></div>

                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>📅 Desde:</span>
                  <input type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12 }} />
                  <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>Hasta:</span>
                  <input type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12 }} />
                  {(dateFrom || dateTo) && (
                    <button onClick={() => { setDateFrom(""); setDateTo(""); }} style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid #e2e8f0", background: "#fff", fontSize: 11, cursor: "pointer", color: "#64748b" }}>✕</button>
                  )}
                </div>

                <input type="text" placeholder="Buscar factura, emisor, CUFE..." value={search} onChange={(e) => setSearch(e.target.value)} style={{ marginLeft: "auto", padding: "7px 14px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, width: 240 }} />
                <button onClick={fetchFacturas} disabled={loading} style={{ padding: "7px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", background: "#fff", color: "#475569", border: "1px solid #e2e8f0" }}>
                  {loading ? "⟳" : "↻"}
                </button>
              </div>

              <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, alignSelf: "center" }}>ATAJOS:</span>
                {[
                  { d: 7, l: "Últimos 7 días" },
                  { d: 30, l: "Últimos 30 días" },
                  { d: 90, l: "Últimos 3 meses" },
                  { d: 365, l: "Último año" },
                ].map(q => (
                  <button key={q.d} onClick={() => quickDate(q.d)} style={{ padding: "4px 10px", borderRadius: 12, border: "1px solid #e2e8f0", background: "#f8fafc", fontSize: 10, fontWeight: 600, cursor: "pointer", color: "#475569" }}>
                    {q.l}
                  </button>
                ))}
              </div>
            </div>

            {loading ? (
              <div style={{ textAlign: "center", padding: 60, color: "#94a3b8", fontSize: 14 }}><span className="spin">⟳</span> Cargando...</div>
            ) : filtered.length === 0 ? (
              <EmptyState 
                icon="🔍" 
                title="Sin resultados" 
                message="No hay facturas que coincidan con los filtros aplicados. Ajusta los criterios o limpia los filtros." 
              />
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {filtered.map((inv) => {
                  const isCausada = causadas.has(inv.cufe) || inv.estado === "CAUSADA";
                  const isExpanded = expanded === inv.cufe;
                  const hasRet = (inv.retefuente > 0 || inv.reteiva > 0 || inv.reteica > 0);

                  return (
                    <div key={inv.cufe || inv.numero_factura} style={{ background: "#fff", borderRadius: 12, border: `1px solid ${isExpanded ? "#3b82f6" : "#e2e8f0"}`, overflow: "hidden", transition: "all 0.15s" }}>
                      <div onClick={() => setExpanded(isExpanded ? null : inv.cufe)} style={{ padding: "14px 20px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                        <div style={{ width: 36, height: 36, borderRadius: 8, background: isCausada ? "#dcfce7" : "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>
                          {isCausada ? "✓" : "📄"}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <div style={{ fontSize: 14, fontWeight: 700 }}>{inv.numero_factura}</div>
                            {inv.categoria && <span style={{ fontSize: 9, background: "#ede9fe", color: "#6d28d9", padding: "1px 6px", borderRadius: 10, fontWeight: 700 }}>{inv.categoria}</span>}
                          </div>
                          <div style={{ fontSize: 12, color: "#64748b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {inv.emisor} · {dateStr(inv.fecha_aprobacion)}
                          </div>
                        </div>
                        <div style={{ textAlign: "right", minWidth: 110 }}>
                          <div style={{ fontSize: 14, fontWeight: 700 }}>{fmt(inv.total)}</div>
                          {hasRet && <div style={{ fontSize: 10, color: "#f59e0b" }}>con retenciones</div>}
                        </div>
                        <div style={{ minWidth: 90 }}><Risk level={inv.risk_level} score={inv.risk_score} /></div>
                        <div style={{ minWidth: 110 }}><Badge status={isCausada ? "CAUSADA" : inv.estado} /></div>
                        <div style={{ fontSize: 16, color: "#94a3b8", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</div>
                      </div>
                      {isExpanded && !isCausada && <InvoiceDetail inv={inv} onCausar={handleCausar} credentials={credentials} erpParams={erpParams} erpLoading={erpLoading} />}
                      {isExpanded && isCausada && (
                        <div style={{ background: "#f0fdf4", padding: 20, borderTop: "1px solid #dcfce7", textAlign: "center", color: "#166534", fontSize: 13 }}>
                          ✓ Esta factura ya fue causada
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </React.Fragment>
        )}
      </div>

      {showSettings && (
        <ApiSettingsModal
          session={session}
          credentials={credentials}
          onClose={() => setShowSettings(false)}
          onSave={async (creds) => {
            // Guardar credenciales en el backend (encriptadas) + en estado local.
            // Si el backend falla, no perdemos la sesión: solo alertamos.
            try {
              const res = await fetch(CONFIG.SAVE_CREDENTIALS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  nit: session.nit,
                  dianUrl: creds.dianUrl,
                  erpUrl: creds.erpUrl,
                  erpUser: creds.erpUser,
                  erpKey: creds.erpKey,
                }),
              });
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const text = await res.text();
              const data = text ? JSON.parse(text) : { success: false, error: "Respuesta vacía" };
              if (!data.success) throw new Error(data.error || "Error al guardar");

              // Al guardar ok, actualizar updatedAt local al momento actual para feedback inmediato
              setCredentials({ ...creds, updatedAt: data.updated_at || new Date().toISOString() });
              setShowSettings(false);
              alert("✓ Credenciales guardadas. Cargando parámetros del ERP...");
            } catch (e) {
              // Mantiene credenciales en local aunque el backend falle, para no bloquear la sesión.
              setCredentials(creds);
              setShowSettings(false);
              alert("⚠ Credenciales aplicadas localmente, pero no se pudieron guardar en el servidor: " + e.message + "\nTendrás que volver a ingresarlas la próxima vez.");
            }
          }}
          onDelete={async () => {
            try {
              const res = await fetch(CONFIG.DELETE_CREDENTIALS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nit: session.nit }),
              });
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const text = await res.text();
              const data = text ? JSON.parse(text) : { success: false, error: "Respuesta vacía" };
              if (!data.success) throw new Error(data.error || "Error al olvidar credenciales");

              setCredentials(null);
              setErpParams(null);
              setShowSettings(false);
              alert("✓ Credenciales olvidadas. Conecta APIs nuevas cuando lo necesites.");
            } catch (e) {
              alert("⚠ No se pudieron olvidar las credenciales en el servidor: " + e.message);
            }
          }}
        />
      )}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  if (!session) return <LoginScreen onLogin={setSession} />;
  return <Dashboard session={session} onLogout={() => setSession(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
