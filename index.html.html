        </ChartCard>
        <ChartCard title="⚠ DISTRIBUCIÓN POR NIVEL DE RIESGO" subtitle="Cantidad de facturas según evaluación IA">
          {stats.riesgoData.length === 0 ? (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "#94a3b8", fontSize: 12 }}>Sin datos de riesgo</div>
          ) : (
            <ResponsiveContainer>
              <PieChart>
                <Pie data={stats.riesgoData} dataKey="count" nameKey="name" cx="50%" cy="50%" innerRadius={50} outerRadius={90} label={(entry) => `${entry.name}: ${entry.count}`} labelLine={false}>
                  {stats.riesgoData.map((entry, i) => <Cell key={i} fill={entry.color} />)}
                </Pie>
                <Tooltip contentStyle={{ borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 12 }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
          )}
        </ChartCard>
      </div>
      <div style={{ marginBottom: 14 }}>
        <ChartCard title="🏛 RETENCIONES POR MES" subtitle="ReteFuente + ReteIVA + ReteICA acumulados" height={260}>
          {stats.retencionesData.length === 0 ? (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "#94a3b8", fontSize: 12 }}>Sin retenciones aplicadas en el período</div>
          ) : (
            <ResponsiveContainer>
              <BarChart data={stats.retencionesData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                <XAxis dataKey="label" tick={{ fontSize: 11, fill: "#64748b" }} />
                <YAxis tick={{ fontSize: 11, fill: "#64748b" }} tickFormatter={fmtCompact} />
                <Tooltip contentStyle={{ borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 12 }} formatter={(value) => fmt(value)} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Bar dataKey="retefuente" stackId="r" fill={CHART_COLORS.retefuente} name="ReteFuente" />
                <Bar dataKey="reteiva" stackId="r" fill={CHART_COLORS.reteiva} name="ReteIVA" />
                <Bar dataKey="reteica" stackId="r" fill={CHART_COLORS.reteica} name="ReteICA" radius={[4, 4, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          )}
        </ChartCard>
      </div>
    </React.Fragment>
  );
}

// ═══════════════════════════════════════════════════════════════
// ASISTENTE (sin cambios)
// ═══════════════════════════════════════════════════════════════
function getQuickPrompts(ctx) {
  if (!ctx.session) return ["¿Qué es este sistema y cómo funciona?", "¿Cómo cambio mi contraseña?", "¿Qué documentos procesa el asistente?"];
  if (ctx.currentInvoice) return ["¿Qué cuenta contable debería usar para esta factura?", "Explícame las retenciones de esta factura", "¿Es deducible este gasto?"];
  if (ctx.dashboardStats && ctx.dashboardStats.count > 0) return ["¿Cuál es mi proveedor más frecuente?", "Resúmeme el gasto del período", "¿Cuánto he retenido en total?"];
  return ["¿Qué significa la cuenta 5110?", "¿Cómo causo una factura de servicios?", "Diferencia entre gasto y costo", "¿Qué es el PUC?"];
}

function AssistantMessage({ role, content }) {
  const isUser = role === "user";
  return (
    <div style={{ display: "flex", justifyContent: isUser ? "flex-end" : "flex-start", marginBottom: 10 }}>
      <div style={{ maxWidth: "85%", padding: "10px 14px", borderRadius: 14, background: isUser ? "#0f172a" : "#f1f5f9", color: isUser ? "#fff" : "#0f172a", fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
        {content}
      </div>
    </div>
  );
}

function AssistantChat({ open, onClose, context }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    if (messages.length === 0) {
      let greeting;
      if (!context.session) {
        greeting = "Hola 👋 Soy el asistente contable. Antes de iniciar sesión puedo responder dudas generales sobre el sistema o sobre contabilidad.";
      } else if (context.dashboardStats && context.dashboardStats.count > 0) {
        greeting = `Hola 👋 Estoy viendo tus ${context.dashboardStats.count} facturas del período. Puedo ayudarte con el PUC, causación, o responder preguntas sobre tus datos — siempre con cifras verificables.`;
      } else {
        greeting = `Hola 👋 Soy tu asistente contable. Puedo ayudarte con el PUC, clasificación de gastos en ${context.session.software_contable || "tu software contable"}, o cualquier duda del proceso.`;
      }
      setMessages([{ role: "assistant", content: greeting }]);
    }
  }, [open]);

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, sending]);

  const send = async (text) => {
    const userMsg = (text || input).trim();
    if (!userMsg || sending) return;
    const newMessages = [...messages, { role: "user", content: userMsg }];
    setMessages(newMessages);
    setInput("");
    setSending(true);
    try {
      const res = await fetch(CONFIG.ASSISTANT_URL, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: newMessages.filter(m => m.role !== "system"),
          context: {
            nit: context.session?.nit || null,
            empresa: context.session?.empresa || null,
            software_contable: context.session?.software_contable || null,
            actividad: context.session?.actividad || null,
            erp_fields: context.erpParams?.fields || null,
            currentInvoice: context.currentInvoice || null,
            currentTab: context.currentTab || null,
            dashboardStats: context.dashboardStats || null,
          },
        }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const data = text ? JSON.parse(text) : { reply: "(Respuesta vacía del servidor)" };
      setMessages([...newMessages, { role: "assistant", content: data.reply || "(sin respuesta)" }]);
    } catch (e) {
      setMessages([...newMessages, { role: "assistant", content: "⚠ Error: " + e.message }]);
    } finally { setSending(false); }
  };

  if (!open) return null;
  const quickPrompts = getQuickPrompts(context);

  return (
    <div className="fade-in" style={{ position: "fixed", bottom: 90, right: 20, width: 380, maxWidth: "calc(100vw - 40px)", height: 560, maxHeight: "calc(100vh - 120px)", background: "#fff", borderRadius: 16, boxShadow: "0 25px 70px rgba(15, 23, 42, 0.35)", display: "flex", flexDirection: "column", zIndex: 99, border: "1px solid #e2e8f0", overflow: "hidden" }}>
      <div style={{ background: "linear-gradient(135deg, #0f172a, #1e293b)", padding: "14px 16px", color: "#fff" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 9, letterSpacing: "0.2em", color: "#94a3b8", fontWeight: 600 }}>ASISTENTE OPUS 4.6</div>
            <div style={{ fontSize: 15, fontWeight: 800, marginTop: 2 }}>💬 Ayuda contable</div>
          </div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", width: 28, height: 28, borderRadius: 8, cursor: "pointer", fontSize: 14 }}>×</button>
        </div>
        {context.currentInvoice && <div style={{ marginTop: 8, fontSize: 10, color: "#94a3b8" }}>Contexto: Factura {context.currentInvoice.numero_factura}</div>}
        {context.dashboardStats && context.dashboardStats.count > 0 && <div style={{ marginTop: 8, fontSize: 10, color: "#a7f3d0" }}>📊 Con acceso a datos del dashboard ({context.dashboardStats.count} facturas)</div>}
      </div>
      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: 14, background: "#fafbfc" }}>
        {messages.map((m, i) => <AssistantMessage key={i} role={m.role} content={m.content} />)}
        {sending && <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 10 }}><div style={{ padding: "10px 14px", borderRadius: 14, background: "#f1f5f9", fontSize: 13, color: "#64748b" }}><span className="spin">⟳</span> Pensando...</div></div>}
      </div>
      {messages.length <= 2 && !sending && (
        <div style={{ padding: "8px 14px", borderTop: "1px solid #e2e8f0", background: "#fafbfc", display: "flex", flexWrap: "wrap", gap: 6 }}>
          {quickPrompts.map((p, i) => (
            <button key={i} onClick={() => send(p)} style={{ padding: "5px 10px", borderRadius: 14, border: "1px solid #cbd5e1", background: "#fff", fontSize: 10, color: "#475569", cursor: "pointer", fontFamily: "inherit" }}>{p}</button>
          ))}
        </div>
      )}
      <div style={{ padding: 12, borderTop: "1px solid #e2e8f0", background: "#fff", display: "flex", gap: 8 }}>
        <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") send(); }} placeholder="Pregunta sobre contabilidad, PUC, gráficas..." disabled={sending} style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 13, fontFamily: "inherit", boxSizing: "border-box" }} />
        <button onClick={() => send()} disabled={sending || !input.trim()} style={{ padding: "0 16px", borderRadius: 10, border: "none", background: sending || !input.trim() ? "#cbd5e1" : "#0f172a", color: "#fff", fontSize: 13, fontWeight: 700, cursor: sending || !input.trim() ? "not-allowed" : "pointer" }}>↑</button>
      </div>
    </div>
  );
}

function AssistantFAB({ context }) {
  const [open, setOpen] = useState(false);
  return (
    <React.Fragment>
      <button onClick={() => setOpen(!open)} aria-label="Abrir asistente" style={{ position: "fixed", bottom: 20, right: 20, width: 56, height: 56, borderRadius: "50%", border: "none", background: open ? "#334155" : "linear-gradient(135deg, #0f172a, #1e293b)", color: "#fff", fontSize: 22, cursor: "pointer", boxShadow: "0 8px 24px rgba(15, 23, 42, 0.35)", zIndex: 98, transition: "transform 0.15s, background 0.15s" }}
        onMouseEnter={(e) => (e.currentTarget.style.transform = "scale(1.08)")}
        onMouseLeave={(e) => (e.currentTarget.style.transform = "scale(1)")}
      >{open ? "×" : "💬"}</button>
      <AssistantChat open={open} onClose={() => setOpen(false)} context={context} />
    </React.Fragment>
  );
}

// ═══════════════════════════════════════════════════════════════
// ⭐ DASHBOARD (con soporte para role master/sub_user)
// ═══════════════════════════════════════════════════════════════
function Dashboard({ session, onLogout, onContextChange, onChangePassword }) {
  const [facturas, setFacturas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [filter, setFilter] = useState("PENDIENTES");
  const [search, setSearch] = useState("");
  const [causadas, setCausadas] = useState(new Set());
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [showSubUsers, setShowSubUsers] = useState(false);
  const [credentials, setCredentials] = useState(session.credentials && session.credentials.erpKey ? session.credentials : null);
  const [erpParams, setErpParams] = useState(null);
  const [erpLoading, setErpLoading] = useState(false);
  const [activeTab, setActiveTab] = useState("facturas");

  const isMaster = session.role === "master";
  const isSubUser = session.role === "sub_user";

  const fetchFacturas = async () => {
    setLoading(true); setError("");
    try {
      const url = `${CONFIG.FACTURAS_URL}?nit=${encodeURIComponent(session.nit)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const data = text ? JSON.parse(text) : [];
      setFacturas(Array.isArray(data) ? data : (data ? [data] : []));
    } catch (e) { setError("No se pudieron cargar las facturas: " + e.message); setFacturas([]); }
    finally { setLoading(false); }
  };

  const fetchErpParams = async (creds) => {
    if (!creds?.erpKey || !creds?.erpUrl) { setErpParams(null); return; }
    setErpLoading(true);
    try {
      const res = await fetch(CONFIG.ERP_PARAMS_URL, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ software: session.software_contable, erpUrl: creds.erpUrl, erpUser: creds.erpUser, erpKey: creds.erpKey, empresa_nit: session.nit }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setErpParams(data);
    } catch (e) { console.error(e); setErpParams({ fields: [] }); }
    finally { setErpLoading(false); }
  };

  useEffect(() => { fetchFacturas(); }, []);
  useEffect(() => { if (credentials) fetchErpParams(credentials); }, [credentials]);
  useEffect(() => { if (onContextChange) onContextChange({ erpParams }); }, [erpParams]);
  useEffect(() => {
    if (!onContextChange) return;
    const current = expanded ? facturas.find(f => f.cufe === expanded) : null;
    onContextChange({ currentInvoice: current });
  }, [expanded, facturas]);
  useEffect(() => { if (onContextChange) onContextChange({ currentTab: activeTab }); }, [activeTab]);

  const handleCausar = async (inv, extras) => {
    try {
      const payload = { ...inv, ...extras, usuario: session.correo || session.email || session.nit, empresa_nit: session.nit, software_contable: session.software_contable, credentials, causado_at: new Date().toISOString() };
      const res = await fetch(CONFIG.CAUSAR_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const data = text ? JSON.parse(text) : { success: false, error: 'Respuesta vacía' };
      if (!data.success) throw new Error(data.error || 'Error desconocido');
      setCausadas((p) => new Set([...p, inv.cufe]));
      alert(`✓ Factura ${inv.numero_factura} causada en ${session.software_contable}`);
      setExpanded(null);
    } catch (e) { alert("Error al causar: " + e.message); }
  };

  const isApproved = (f) => f.estado === "APROBADA" || f.estado === "APROBADA_AUTOMATICAMENTE";

  const dateFiltered = useMemo(() => {
    return facturas.filter((f) => {
      const fechaInv = dateFromInv(f);
      if (dateFrom && fechaInv) { if (fechaInv < new Date(dateFrom)) return false; }
      if (dateTo && fechaInv) {
        const hasta = new Date(dateTo);
        hasta.setHours(23, 59, 59);
        if (fechaInv > hasta) return false;
      }
      if (search) {
        const s = search.toLowerCase();
        if (![f.numero_factura, f.emisor, f.emisor_nit, f.cufe].some((v) => (v || "").toLowerCase().includes(s))) return false;
      }
      return true;
    });
  }, [facturas, dateFrom, dateTo, search]);

  const filtered = useMemo(() => {
    return dateFiltered.filter((f) => {
      const causada = causadas.has(f.cufe) || f.estado === "CAUSADA";
      if (filter === "PENDIENTES" && (causada || !isApproved(f))) return false;
      if (filter === "CAUSADAS" && !causada) return false;
      return true;
    });
  }, [dateFiltered, filter, causadas]);

  const stats = useMemo(() => {
    const aprobadas = facturas.filter(isApproved);
    const pendientes = aprobadas.filter((f) => !causadas.has(f.cufe) && f.estado !== "CAUSADA");
    const causadasArr = facturas.filter((f) => f.estado === "CAUSADA" || causadas.has(f.cufe));
    const totalMonto = filtered.reduce((acc, f) => acc + (Number(f.total) || 0), 0);
    return { pendientes: pendientes.length, causadas: causadasArr.length, total: aprobadas.length, totalMonto };
  }, [facturas, filtered, causadas]);

  const dashboardStats = useMemo(() => computeDashboardStats(dateFiltered, causadas, dateFrom, dateTo), [dateFiltered, causadas, dateFrom, dateTo]);

  useEffect(() => { if (onContextChange) onContextChange({ dashboardStats }); }, [dashboardStats]);

  const quickDate = (dias) => {
    const hasta = new Date();
    const desde = new Date();
    desde.setDate(desde.getDate() - dias);
    setDateFrom(desde.toISOString().slice(0, 10));
    setDateTo(hasta.toISOString().slice(0, 10));
  };

  const noFacturasForEmpresa = !loading && !error && facturas.length === 0;

  // Etiqueta que muestra quién está logueado
  const userBadge = isSubUser
    ? `👤 ${session.nombre || session.email} · Usuario`
    : `🏢 Admin · ${session.correo}`;

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ background: "linear-gradient(135deg, #0f172a, #1e293b)", padding: "18px 24px", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600, marginBottom: 4 }}>ASISTENTE OPUS 4.6</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>Causación de Facturas</div>
            {session.empresa && session.empresa !== session.correo && (
              <div style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 600, marginTop: 6 }}>{session.empresa}</div>
            )}
            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>NIT {session.nit} · {session.software_contable} · {userBadge}</div>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            {/* ⭐ Solo master puede conectar APIs y gestionar usuarios */}
            {isMaster && (
              <button onClick={() => setShowSettings(true)} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: credentials ? "#10b981" : "transparent", color: credentials ? "#fff" : "#94a3b8", border: `1px solid ${credentials ? "#10b981" : "#334155"}` }}>
                {credentials ? "✓ APIs conectadas" : "⚙ Conectar APIs"}
              </button>
            )}
            {isMaster && (
              <button onClick={() => setShowSubUsers(true)} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: "transparent", color: "#94a3b8", border: "1px solid #334155" }}>
                👥 Usuarios
              </button>
            )}
            <button onClick={onChangePassword} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer", background: "transparent", color: "#94a3b8", border: "1px solid #334155" }}>
              🔒 Cambiar contraseña
            </button>
            <button onClick={onLogout} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer", background: "transparent", color: "#94a3b8", border: "1px solid #334155" }}>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "16px 24px" }}>
        {noFacturasForEmpresa ? (
          <div style={{ marginTop: 40 }}>
            <EmptyState icon="📄" title="No se han procesado facturas" message="Cuando lleguen facturas electrónicas aprobadas a tu correo, aparecerán aquí para causarlas en tu software contable." />
          </div>
        ) : (
          <React.Fragment>
            <div style={{ display: "flex", gap: 4, marginBottom: 14, borderBottom: "2px solid #e2e8f0", paddingBottom: 0 }}>
              {[
                { key: "facturas", label: "📋 Facturas" },
                { key: "dashboard", label: "📊 Dashboard" },
              ].map(t => (
                <button key={t.key} onClick={() => setActiveTab(t.key)} style={{
                  padding: "10px 20px", border: "none", background: "transparent",
                  fontSize: 13, fontWeight: 700, cursor: "pointer",
                  color: activeTab === t.key ? "#0f172a" : "#94a3b8",
                  borderBottom: `3px solid ${activeTab === t.key ? "#0f172a" : "transparent"}`,
                  marginBottom: -2, fontFamily: "inherit", transition: "all 0.15s",
                }}>{t.label}</button>
              ))}
            </div>

            {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: "#991b1b" }}>{error}</div>}

            <div style={{ background: "#fff", borderRadius: 12, padding: 14, border: "1px solid #e2e8f0", marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                {activeTab === "facturas" && [
                  { key: "PENDIENTES", label: `Pendientes (${stats.pendientes})` },
                  { key: "CAUSADAS", label: `Causadas (${stats.causadas})` },
                  { key: "ALL", label: `Todas (${stats.total})` },
                ].map((f) => (
                  <button key={f.key} onClick={() => setFilter(f.key)} style={{
                    padding: "7px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer",
                    background: filter === f.key ? "#0f172a" : "#f8fafc",
                    color: filter === f.key ? "#fff" : "#475569",
                    border: `1px solid ${filter === f.key ? "#0f172a" : "#e2e8f0"}`,
                  }}>{f.label}</button>
                ))}
                {activeTab === "facturas" && <div style={{ width: 1, height: 24, background: "#e2e8f0", margin: "0 4px" }} />}
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>📅 Desde:</span>
                  <input type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12 }} />
                  <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>Hasta:</span>
                  <input type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #e2e8f0", fontSize: 12 }} />
                  {(dateFrom || dateTo) && (
                    <button onClick={() => { setDateFrom(""); setDateTo(""); }} style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid #e2e8f0", background: "#fff", fontSize: 11, cursor: "pointer", color: "#64748b" }}>✕</button>
                  )}
                </div>
                {activeTab === "facturas" && (
                  <input type="text" placeholder="Buscar factura, emisor, CUFE..." value={search} onChange={(e) => setSearch(e.target.value)} style={{ marginLeft: "auto", padding: "7px 14px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, width: 240 }} />
                )}
                {activeTab === "dashboard" && (
                  <input type="text" placeholder="Filtrar por proveedor..." value={search} onChange={(e) => setSearch(e.target.value)} style={{ marginLeft: "auto", padding: "7px 14px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, width: 240 }} />
                )}
                <button onClick={fetchFacturas} disabled={loading} title="Refrescar" style={{ padding: "7px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", background: "#fff", color: "#475569", border: "1px solid #e2e8f0" }}>
                  {loading ? "⟳" : "↻"}
                </button>
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, alignSelf: "center" }}>ATAJOS:</span>
                {[
                  { d: 7, l: "Últimos 7 días" }, { d: 30, l: "Últimos 30 días" },
                  { d: 90, l: "Últimos 3 meses" }, { d: 365, l: "Último año" },
                ].map(q => (
                  <button key={q.d} onClick={() => quickDate(q.d)} style={{ padding: "4px 10px", borderRadius: 12, border: "1px solid #e2e8f0", background: "#f8fafc", fontSize: 10, fontWeight: 600, cursor: "pointer", color: "#475569" }}>{q.l}</button>
                ))}
              </div>
            </div>

            {activeTab === "facturas" && (
              <React.Fragment>
                <div style={{ display: "flex", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
                  <StatCard icon="⏳" label="PENDIENTES" value={stats.pendientes} color="#10b981" />
                  <StatCard icon="✓" label="CAUSADAS" value={stats.causadas} color="#6366f1" />
                  <StatCard icon="📄" label="TOTAL APROBADAS" value={stats.total} />
                  <StatCard icon="💰" label="MONTO FILTRADO" value={fmt(stats.totalMonto)} />
                </div>
                {loading ? (
                  <div style={{ textAlign: "center", padding: 60, color: "#94a3b8", fontSize: 14 }}><span className="spin">⟳</span> Cargando...</div>
                ) : filtered.length === 0 ? (
                  <EmptyState icon="🔍" title="Sin resultados" message="No hay facturas que coincidan con los filtros aplicados." />
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {filtered.map((inv) => {
                      const isCausada = causadas.has(inv.cufe) || inv.estado === "CAUSADA";
                      const isExpanded = expanded === inv.cufe;
                      const hasRet = (inv.retefuente > 0 || inv.reteiva > 0 || inv.reteica > 0);
                      return (
                        <div key={inv.cufe || inv.numero_factura} style={{ background: "#fff", borderRadius: 12, border: `1px solid ${isExpanded ? "#3b82f6" : "#e2e8f0"}`, overflow: "hidden", transition: "all 0.15s" }}>
                          <div onClick={() => setExpanded(isExpanded ? null : inv.cufe)} style={{ padding: "14px 20px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                            <div style={{ width: 36, height: 36, borderRadius: 8, background: isCausada ? "#dcfce7" : "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{isCausada ? "✓" : "📄"}</div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                <div style={{ fontSize: 14, fontWeight: 700 }}>{inv.numero_factura}</div>
                                {inv.categoria && <span style={{ fontSize: 9, background: "#ede9fe", color: "#6d28d9", padding: "1px 6px", borderRadius: 10, fontWeight: 700 }}>{inv.categoria}</span>}
                              </div>
                              <div style={{ fontSize: 12, color: "#64748b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{inv.emisor} · {dateStr(inv.fecha_aprobacion)}</div>
                            </div>
                            <div style={{ textAlign: "right", minWidth: 110 }}>
                              <div style={{ fontSize: 14, fontWeight: 700 }}>{fmt(inv.total)}</div>
                              {hasRet && <div style={{ fontSize: 10, color: "#f59e0b" }}>con retenciones</div>}
                            </div>
                            <div style={{ minWidth: 90 }}><Risk level={inv.risk_level} score={inv.risk_score} /></div>
                            <div style={{ minWidth: 110 }}><Badge status={isCausada ? "CAUSADA" : inv.estado} /></div>
                            <div style={{ fontSize: 16, color: "#94a3b8", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</div>
                          </div>
                          {isExpanded && !isCausada && <InvoiceDetail inv={inv} onCausar={handleCausar} credentials={credentials} erpParams={erpParams} erpLoading={erpLoading} />}
                          {isExpanded && isCausada && <div style={{ background: "#f0fdf4", padding: 20, borderTop: "1px solid #dcfce7", textAlign: "center", color: "#166534", fontSize: 13 }}>✓ Esta factura ya fue causada</div>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </React.Fragment>
            )}

            {activeTab === "dashboard" && <DashboardView stats={dashboardStats} loading={loading} />}
          </React.Fragment>
        )}
      </div>

      {showSettings && isMaster && (
        <ApiSettingsModal session={session} credentials={credentials} onClose={() => setShowSettings(false)}
          onSave={async (creds) => {
            try {
              const res = await fetch(CONFIG.SAVE_CREDENTIALS_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ nit: session.nit, dianUrl: creds.dianUrl, erpUrl: creds.erpUrl, erpUser: creds.erpUser, erpKey: creds.erpKey }) });
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const text = await res.text();
              const data = text ? JSON.parse(text) : { success: false, error: "Respuesta vacía" };
              if (!data.success) throw new Error(data.error || "Error al guardar");
              setCredentials({ ...creds, updatedAt: data.updated_at || new Date().toISOString() });
              setShowSettings(false);
              alert("✓ Credenciales guardadas. Cargando parámetros del ERP...");
            } catch (e) {
              setCredentials(creds); setShowSettings(false);
              alert("⚠ Credenciales aplicadas localmente: " + e.message);
            }
          }}
          onDelete={async () => {
            try {
              const res = await fetch(CONFIG.DELETE_CREDENTIALS_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ nit: session.nit }) });
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const text = await res.text();
              const data = text ? JSON.parse(text) : { success: false, error: "Respuesta vacía" };
              if (!data.success) throw new Error(data.error || "Error al olvidar credenciales");
              setCredentials(null); setErpParams(null); setShowSettings(false);
              alert("✓ Credenciales olvidadas.");
            } catch (e) { alert("⚠ Error: " + e.message); }
          }}
        />
      )}

      {showSubUsers && isMaster && (
        <SubUsersModal session={session} onClose={() => setShowSubUsers(false)} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP (router)
// ═══════════════════════════════════════════════════════════════
function getInitialView() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("reset_token")) return "reset";
  return "login";
}

function App() {
  const [view, setView] = useState(getInitialView);
  const [session, setSession] = useState(null);
  const [forcedChangeCtx, setForcedChangeCtx] = useState(null);
  const [resetToken, setResetToken] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get("reset_token") || null;
  });
  const [assistantContext, setAssistantContext] = useState({ session: null, erpParams: null, currentInvoice: null, currentTab: null, dashboardStats: null });

  useEffect(() => { setAssistantContext((c) => ({ ...c, session })); }, [session]);

  const clearResetTokenFromUrl = () => {
    const url = new URL(window.location.href);
    url.searchParams.delete("reset_token");
    window.history.replaceState({}, "", url.toString());
  };

  let screen;
  if (view === "reset" && resetToken) {
    screen = <ResetPasswordScreen token={resetToken} onSuccess={() => { clearResetTokenFromUrl(); setResetToken(null); setView("login"); }} />;
  } else if (view === "forgot") {
    screen = <ForgotPasswordScreen onBack={() => setView("login")} />;
  } else if (view === "change_forced" && forcedChangeCtx) {
    screen = <ChangePasswordScreen mode="forced" nit={forcedChangeCtx.nit} changeToken={forcedChangeCtx.change_token}
      onSuccess={() => { setForcedChangeCtx(null); setView("login"); alert("✓ Contraseña actualizada. Inicia sesión con tu nueva contraseña."); }}
      onCancel={() => {}} />;
  } else if (view === "change_voluntary" && session) {
    // ⭐ Si es sub-usuario, el modo es "sub_user" (requiere aprobación del master)
    const mode = session.role === "sub_user" ? "sub_user" : "voluntary";
    screen = <ChangePasswordScreen mode={mode} session={session} nit={session.nit}
      onSuccess={() => { setView("dashboard"); alert("✓ Contraseña actualizada correctamente."); }}
      onCancel={() => setView("dashboard")} />;
  } else if (view === "dashboard" && session) {
    screen = <Dashboard session={session} onLogout={() => { setSession(null); setView("login"); }} onChangePassword={() => setView("change_voluntary")} onContextChange={(partial) => setAssistantContext((c) => ({ ...c, ...partial }))} />;
  } else {
    screen = <LoginScreen onLogin={(data) => { setSession(data); setView("dashboard"); }} onForgotPassword={() => setView("forgot")} onRequirePasswordChange={(ctx) => { setForcedChangeCtx(ctx); setView("change_forced"); }} />;
  }

  return (
    <React.Fragment>
      {screen}
      <AssistantFAB context={assistantContext} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
