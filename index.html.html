// ENROLLMENT SCREEN (Fase 2) — configuración inicial 2FA
// ═══════════════════════════════════════════════════════════════
function EnrollmentScreen({ ctx, onSuccess, onCancel }) {
  const { enrollmentJwt, nit, userId } = ctx;
  const [step, setStep] = useState("intro");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [enrollData, setEnrollData] = useState(null);
  const [code, setCode] = useState("");
  const [backupCodes, setBackupCodes] = useState([]);
  const qrContainerRef = useRef(null);
  const [qrError, setQrError] = useState("");
  const startEnrollment = async () => {
    setLoading(true); setError("");
    try {
      const res = await fetch(CONFIG.TWOFA_ENROLL_START_URL, {
        method: "POST",
        headers: { "Authorization": `Bearer ${enrollmentJwt}`, "Content-Type": "application/json" },
        body: JSON.stringify({ nit }),
      });
      if (res.status === 401) {
        setError("Tu sesión de configuración expiró. Vuelve a iniciar sesión.");
        setLoading(false);
        setTimeout(() => onCancel(), 2000);
        return;
      }
      const text = await res.text();
      if (!text) { setError("Respuesta vacía del servidor. Posible rate limit."); setLoading(false); return; }
      const data = JSON.parse(text);
      if (!data.success) { setError(data.error || "No se pudo iniciar el enrolamiento"); setLoading(false); return; }
      setEnrollData(data);
      setStep("qr");
    } catch (e) { setError(e.message); } finally { setLoading(false); }
  };
  useEffect(() => {
    if (step !== "qr" || !enrollData || !enrollData.otpauth_uri) return;
    setQrError("");
    let attempts = 0;
    const maxAttempts = 50;
    const tryRender = () => {
      attempts++;
      const container = qrContainerRef.current;
      if (!container) {
        if (attempts < maxAttempts) return setTimeout(tryRender, 100);
        setQrError("Contenedor no disponible");
        return;
      }
      if (typeof window.qrcode !== "function") {
        if (attempts < maxAttempts) return setTimeout(tryRender, 100);
        setQrError("La librería QR no cargó. Usa el código manual abajo.");
        return;
      }
      try {
        const qr = window.qrcode(0, "M");
        qr.addData(enrollData.otpauth_uri);
        qr.make();
        container.innerHTML = qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });
        const svg = container.querySelector("svg");
        if (svg) {
          svg.setAttribute("width", "220");
          svg.setAttribute("height", "220");
          svg.style.display = "block";
        }
      } catch (e) {
        console.error("QR error:", e);
        setQrError("Error generando QR: " + e.message + ". Usa el código manual.");
      }
    };
    tryRender();
  }, [step, enrollData]);
  const confirmEnrollment = async (e) => {
    if (e) e.preventDefault();
    if (!/^\d{6}$/.test(code)) { setError("Ingresa los 6 dígitos del código"); return; }
    setLoading(true); setError("");
    try {
      const res = await fetch(CONFIG.TWOFA_ENROLL_CONFIRM_URL, {
        method: "POST",
        headers: { "Authorization": `Bearer ${enrollmentJwt}`, "Content-Type": "application/json" },
        body: JSON.stringify({ nit, enrollment_token: enrollData.enrollment_token, code }),
      });
      if (res.status === 401) {
        setError("Tu sesión expiró.");
        setLoading(false);
        setTimeout(() => onCancel(), 2000);
        return;
      }
      const text = await res.text();
      if (!text) { setError("Respuesta vacía del servidor"); setLoading(false); return; }
      const data = JSON.parse(text);
      if (!data.success) { setError(data.error || "Código incorrecto"); setLoading(false); return; }
      setBackupCodes(data.backup_codes || []);
      setStep("backup");
    } catch (e) { setError(e.message); } finally { setLoading(false); }
  };
  const copyBackupCodes = () => {
    const text = `Códigos de respaldo 2FA\nNIT: ${nit}\nUsuario: ${userId}\nFecha: ${new Date().toLocaleString("es-CO")}\n\n${backupCodes.join("\n")}\n\n⚠️ Guárdalos en un lugar seguro. Cada código solo sirve una vez.`;
    navigator.clipboard.writeText(text).then(
      () => alert("✓ Copiados al portapapeles"),
      () => alert("No se pudo copiar. Selecciona y copia manualmente.")
    );
  };
  const downloadBackupCodes = () => {
    const text = `Códigos de respaldo 2FA\nNIT: ${nit}\nUsuario: ${userId}\nFecha: ${new Date().toLocaleString("es-CO")}\n\n${backupCodes.join("\n")}\n\n⚠️ Guárdalos en un lugar seguro. Cada código solo sirve una vez.`;
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `2fa-backup-${nit}-${Date.now()}.txt`; a.click();
    URL.revokeObjectURL(url);
  };
  if (step === "intro") {
    return (
      <AuthLayout title="🛡 Configura 2FA" subtitle="La autenticación en dos pasos es obligatoria para acceder al sistema">
        <div style={{ background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 10, padding: 16, marginBottom: 16, fontSize: 12, color: "#0c4a6e", lineHeight: 1.6 }}>
          <div style={{ fontWeight: 700, marginBottom: 6 }}>¿Por qué 2FA?</div>
          Aunque alguien conozca tu contraseña, no podrá entrar sin el código de 6 dígitos que genera tu teléfono.
        </div>
        <div style={{ fontSize: 12, color: "#475569", lineHeight: 1.6, marginBottom: 14 }}>
          <div style={{ marginBottom: 8 }}><strong>Paso 1:</strong> Instala una app de autenticación en tu teléfono</div>
          <ul style={{ margin: "0 0 12px 20px", padding: 0 }}>
            <li>Google Authenticator</li>
            <li>Microsoft Authenticator</li>
            <li>Authy</li>
            <li>1Password</li>
          </ul>
          <div><strong>Paso 2:</strong> Escanea el QR que aparecerá a continuación</div>
          <div><strong>Paso 3:</strong> Confirma con el primer código generado</div>
          <div><strong>Paso 4:</strong> Guarda los 8 códigos de respaldo (por si pierdes el teléfono)</div>
        </div>
        {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
        <button onClick={startEnrollment} disabled={loading} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: "#0f172a", color: "#fff", fontSize: 14, fontWeight: 700, cursor: loading ? "not-allowed" : "pointer", marginBottom: 8 }}>
          {loading ? <span><span className="spin">⟳</span> Preparando...</span> : "Comenzar configuración"}
        </button>
        <button onClick={onCancel} disabled={loading} style={{ width: "100%", padding: 10, borderRadius: 10, border: "1px solid #e2e8f0", background: "#fff", color: "#475569", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
          Cancelar y cerrar sesión
        </button>
      </AuthLayout>
    );
  }
  if (step === "qr") {
    return (
      <AuthLayout title="📱 Escanea el código QR" subtitle="Abre tu app de autenticación y escanea este código">
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 16, padding: 12, background: "#fff", borderRadius: 10, border: "1px solid #e2e8f0", minHeight: 240 }}>
          <div ref={qrContainerRef} style={{ minWidth: 220, minHeight: 220, display: "flex", alignItems: "center", justifyContent: "center" }}>
            {!qrError && <span style={{ color: "#64748b", fontSize: 12 }}><span className="spin">⟳</span> Generando QR...</span>}
          </div>
          {qrError && (
            <div style={{ color: "#991b1b", fontSize: 11, textAlign: "center", padding: "12px", lineHeight: 1.5 }}>
              ⚠ {qrError}
            </div>
          )}
        </div>
        <div style={{ fontSize: 11, color: "#64748b", textAlign: "center", marginBottom: 8 }}>
          ¿No puedes escanear? Ingresa este código manualmente:
        </div>
        <div style={{ fontFamily: "monospace", fontSize: 13, textAlign: "center", padding: "8px 12px", background: "#f8fafc", borderRadius: 6, border: "1px solid #e2e8f0", marginBottom: 16, wordBreak: "break-all", color: "#334155" }}>
          {enrollData ? enrollData.secret : ""}
        </div>
        <form onSubmit={confirmEnrollment}>
          <label style={{ display: "block", fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 6, letterSpacing: "0.05em" }}>CÓDIGO DE 6 DÍGITOS</label>
          <input type="text" value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 6))}
            placeholder="123456" autoFocus disabled={loading} inputMode="numeric" autoComplete="one-time-code"
            style={{ width: "100%", padding: "14px 16px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 22, fontFamily: "monospace", textAlign: "center", letterSpacing: "0.4em", marginBottom: 12 }} />
          {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
          <button type="submit" disabled={loading || code.length !== 6} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: loading || code.length !== 6 ? "#94a3b8" : "#0f172a", color: "#fff", fontSize: 14, fontWeight: 700, cursor: loading || code.length !== 6 ? "not-allowed" : "pointer" }}>
            {loading ? <span><span className="spin">⟳</span> Verificando...</span> : "Confirmar"}
          </button>
        </form>
      </AuthLayout>
    );
  }
  // step === "backup"
  return (
    <AuthLayout title="🔑 Códigos de respaldo" subtitle="Guárdalos: son tu única forma de recuperar acceso si pierdes el teléfono">
      <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 10, padding: 14, marginBottom: 16, fontSize: 12, color: "#92400e", lineHeight: 1.5 }}>
        ⚠ <strong>IMPORTANTE:</strong> Estos códigos se muestran UNA sola vez. Cópialos o descárgalos ahora. Cada código solo sirve una vez.
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16, padding: 12, background: "#f8fafc", borderRadius: 10, border: "1px solid #e2e8f0" }}>
        {backupCodes.map((c, i) => (
          <div key={i} style={{ fontFamily: "monospace", fontSize: 13, padding: "6px 10px", background: "#fff", border: "1px solid #e2e8f0", borderRadius: 6, textAlign: "center", color: "#0f172a", fontWeight: 600 }}>
            {c}
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <button onClick={copyBackupCodes} style={{ flex: 1, padding: 10, borderRadius: 8, border: "1px solid #e2e8f0", background: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", color: "#475569" }}>📋 Copiar</button>
        <button onClick={downloadBackupCodes} style={{ flex: 1, padding: 10, borderRadius: 8, border: "1px solid #e2e8f0", background: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", color: "#475569" }}>💾 Descargar .txt</button>
      </div>
      <button onClick={onSuccess} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: "#16a34a", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
        ✓ Ya los guardé, iniciar sesión
      </button>
    </AuthLayout>
  );
}

// ═══════════════════════════════════════════════════════════════
// TWO-FACTOR SCREEN (Fase 2) — verificación TOTP post-login
// ═══════════════════════════════════════════════════════════════
function TwoFactorScreen({ ctx, onSuccess, onCancel }) {
  const { pendingToken, expiresAt, nit } = ctx;
  const [code, setCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [useBackup, setUseBackup] = useState(false);
  const [backupCode, setBackupCode] = useState("");
  const [secondsLeft, setSecondsLeft] = useState(300);
  useEffect(() => {
    const compute = () => {
      const remaining = Math.max(0, Math.floor((new Date(expiresAt).getTime() - Date.now()) / 1000));
      setSecondsLeft(remaining);
    };
    compute();
    const interval = setInterval(compute, 1000);
    return () => clearInterval(interval);
  }, [expiresAt]);
  const submitTotp = async (e) => {
    if (e) e.preventDefault();
    if (!/^\d{6}$/.test(code)) { setError("Ingresa los 6 dígitos del código"); return; }
    setLoading(true); setError("");
    try {
      const res = await fetch(CONFIG.TWOFA_VERIFY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pending_token: pendingToken, code, nit }),
      });
      const text = await res.text();
      if (!text) throw new Error("Respuesta vacía del servidor");
      const data = JSON.parse(text);
      if (!data.success) {
        setError(data.error || "Código incorrecto");
        setCode("");
        setLoading(false);
        return;
      }
      onSuccess(data);
    } catch (e) { setError(e.message); setLoading(false); }
  };
  const submitBackup = async (e) => {
    if (e) e.preventDefault();
    const cleaned = backupCode.toUpperCase().trim();
    if (!/^[0-9A-F]{4}-[0-9A-F]{4}$/.test(cleaned)) { setError("Formato: XXXX-XXXX (solo letras A-F y números 0-9)"); return; }
    setLoading(true); setError("");
    try {
      const res = await fetch(CONFIG.TWOFA_RECOVERY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pending_token: pendingToken, backup_code: cleaned, nit }),
      });
      const text = await res.text();
      if (!text) throw new Error("Respuesta vacía del servidor");
      const data = JSON.parse(text);
      if (!data.success) { setError(data.error || "Código de respaldo inválido"); setLoading(false); return; }
      alert("⚠ Login de emergencia exitoso. Tu 2FA fue desactivado. Deberás configurarlo de nuevo en tu próximo login.");
      onSuccess(data);
    } catch (e) { setError(e.message); setLoading(false); }
  };
  const minutes = Math.floor(secondsLeft / 60);
  const seconds = secondsLeft % 60;
  const expired = secondsLeft === 0;
  return (
    <AuthLayout title="🔐 Código de verificación" subtitle={useBackup ? "Ingresa uno de tus códigos de respaldo" : "Ingresa el código de 6 dígitos de tu app"}>
      {!expired && (
        <div style={{ fontSize: 11, color: secondsLeft < 60 ? "#ef4444" : "#64748b", textAlign: "center", marginBottom: 12 }}>
          Expira en {String(minutes).padStart(2, "0")}:{String(seconds).padStart(2, "0")}
        </div>
      )}
      {expired && (
        <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12, textAlign: "center" }}>
          ⏱ La sesión expiró. Vuelve a iniciar sesión.
        </div>
      )}
      {!useBackup ? (
        <form onSubmit={submitTotp}>
          <input type="text" value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 6))}
            placeholder="123456" autoFocus disabled={loading || expired} inputMode="numeric" autoComplete="one-time-code"
            style={{ width: "100%", padding: "14px 16px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 24, fontFamily: "monospace", textAlign: "center", letterSpacing: "0.4em", marginBottom: 12 }} />
          {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
          <button type="submit" disabled={loading || code.length !== 6 || expired} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: loading || code.length !== 6 || expired ? "#94a3b8" : "#0f172a", color: "#fff", fontSize: 14, fontWeight: 700, cursor: loading || code.length !== 6 || expired ? "not-allowed" : "pointer", marginBottom: 10 }}>
            {loading ? <span><span className="spin">⟳</span> Verificando...</span> : "Verificar"}
          </button>
          <button type="button" onClick={() => { setUseBackup(true); setError(""); setCode(""); }} disabled={loading || expired} style={{ width: "100%", padding: 10, borderRadius: 10, border: "none", background: "transparent", color: expired ? "#94a3b8" : "#0369a1", fontSize: 12, fontWeight: 600, cursor: expired ? "not-allowed" : "pointer", textDecoration: "underline", marginBottom: 6 }}>
            ¿Perdiste tu dispositivo? Usar código de respaldo
          </button>
        </form>
      ) : (
        <form onSubmit={submitBackup}>
          <input type="text" value={backupCode} onChange={(e) => setBackupCode(e.target.value.toUpperCase())}
            placeholder="XXXX-XXXX" autoFocus disabled={loading || expired} maxLength={9}
            style={{ width: "100%", padding: "14px 16px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 18, fontFamily: "monospace", textAlign: "center", letterSpacing: "0.2em", marginBottom: 12, textTransform: "uppercase" }} />
          <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 8, padding: "10px 14px", fontSize: 11, color: "#92400e", marginBottom: 12, lineHeight: 1.5 }}>
            ⚠ Al usar un código de respaldo, tu 2FA se desactivará. En el siguiente login deberás configurarlo nuevamente.
          </div>
          {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
          <button type="submit" disabled={loading || !backupCode || expired} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: loading || !backupCode || expired ? "#94a3b8" : "#dc2626", color: "#fff", fontSize: 14, fontWeight: 700, cursor: loading || !backupCode || expired ? "not-allowed" : "pointer", marginBottom: 10 }}>
            {loading ? <span><span className="spin">⟳</span> Verificando...</span> : "Usar código de respaldo"}
          </button>
          <button type="button" onClick={() => { setUseBackup(false); setError(""); setBackupCode(""); }} disabled={loading} style={{ width: "100%", padding: 10, borderRadius: 10, border: "1px solid #e2e8f0", background: "#fff", color: "#475569", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
            Volver al código normal
          </button>
        </form>
      )}
      {onCancel && (
        <button onClick={onCancel} disabled={loading} style={{ width: "100%", padding: 10, borderRadius: 10, border: "none", background: "transparent", color: "#94a3b8", fontSize: 11, fontWeight: 600, cursor: "pointer", marginTop: 10 }}>
          Cancelar login
        </button>
      )}
    </AuthLayout>
  );
}

// ═══════════════════════════════════════════════════════════════
// TWO-FACTOR SETTINGS MODAL (Fase 2)
// ═══════════════════════════════════════════════════════════════
function TwoFactorSettingsModal({ session, authFetch, onClose, onLogoutAfterDisable }) {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("overview");
  const [password, setPassword] = useState("");
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  const [processing, setProcessing] = useState(false);
  const fetchStatus = async () => {
    setLoading(true); setError("");
    try {
      const { data } = await authFetch(CONFIG.TWOFA_STATUS_URL, {
        method: "POST",
        body: JSON.stringify({ nit: session.nit }),
      });
      setStatus(data);
    } catch (e) {
      if (e.message !== "SESSION_EXPIRED") setError("No se pudo cargar estado: " + e.message);
    } finally { setLoading(false); }
  };
  useEffect(() => { fetchStatus(); }, []);
  const handleDisable = async (e) => {
    e.preventDefault();
    if (!password || !/^\d{6}$/.test(code)) { setError("Password y código de 6 dígitos requeridos"); return; }
    setProcessing(true); setError("");
    try {
      const { data } = await authFetch(CONFIG.TWOFA_DISABLE_URL, {
        method: "POST",
        body: JSON.stringify({ nit: session.nit, password, code }),
      });
      if (!data.success) { setError(data.error || "Error al desactivar 2FA"); setProcessing(false); return; }
      alert("✓ 2FA desactivado. En el próximo login deberás configurarlo nuevamente (es obligatorio).");
      onClose();
      if (onLogoutAfterDisable) setTimeout(() => onLogoutAfterDisable(), 500);
    } catch (e) {
      if (e.message !== "SESSION_EXPIRED") setError(e.message);
    } finally { setProcessing(false); }
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="fade-in" style={{ background: "#fff", borderRadius: 16, padding: 32, maxWidth: 520, width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 25px 80px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600 }}>AUTENTICACIÓN EN DOS PASOS</div>
            <div style={{ fontSize: 18, fontWeight: 800, marginTop: 4 }}>🛡 Configuración de 2FA</div>
          </div>
          <button onClick={onClose} style={{ background: "#f1f5f9", border: "none", borderRadius: 8, width: 32, height: 32, fontSize: 16, cursor: "pointer", color: "#64748b" }}>×</button>
        </div>
        {loading && <div style={{ textAlign: "center", padding: 40, color: "#94a3b8", fontSize: 13 }}><span className="spin">⟳</span> Cargando...</div>}
        {!loading && status && view === "overview" && (
          <div>
            {status.enabled ? (
              <div style={{ background: "#dcfce7", border: "1px solid #86efac", borderRadius: 10, padding: 14, marginBottom: 14 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#166534", marginBottom: 4 }}>✓ 2FA está activo</div>
                <div style={{ fontSize: 11, color: "#166534", lineHeight: 1.5 }}>
                  {status.enrolled_at && <>Activado el {new Date(status.enrolled_at).toLocaleDateString("es-CO")}<br /></>}
                  Códigos de respaldo disponibles: <strong>{status.backup_codes_remaining}/8</strong>
                  {status.last_used_at && <><br />Último uso: {new Date(status.last_used_at).toLocaleString("es-CO")}</>}
                </div>
              </div>
            ) : (
              <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 10, padding: 14, marginBottom: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#92400e" }}>⚠ 2FA no está activo</div>
                <div style={{ fontSize: 11, color: "#92400e", marginTop: 4 }}>Cierra sesión y vuelve a iniciar para configurarlo (es obligatorio).</div>
              </div>
            )}
            {status.enabled && status.backup_codes_remaining <= 2 && (
              <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10, padding: 14, marginBottom: 14, fontSize: 11, color: "#991b1b", lineHeight: 1.5 }}>
                ⚠ Tienes pocos códigos de respaldo ({status.backup_codes_remaining}). Considera desactivar y reactivar 2FA para regenerar los 8.
              </div>
            )}
            {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
            {status.enabled && (
              <button onClick={() => { setView("disable"); setError(""); }} style={{ width: "100%", padding: 12, borderRadius: 10, border: "1px solid #fecaca", background: "#fff", color: "#b91c1c", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                🔓 Desactivar 2FA
              </button>
            )}
          </div>
        )}
        {!loading && view === "disable" && (
          <form onSubmit={handleDisable}>
            <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10, padding: 14, marginBottom: 14, fontSize: 12, color: "#991b1b", lineHeight: 1.5 }}>
              Para confirmar, ingresa tu contraseña actual y el código de 6 dígitos de tu app.<br />
              <strong>Importante:</strong> Al desactivar, quedarás fuera hasta configurar 2FA de nuevo en el próximo login.
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={{ display: "block", fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 6 }}>CONTRASEÑA ACTUAL</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} disabled={processing}
                style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 14 }} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={{ display: "block", fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 6 }}>CÓDIGO ACTUAL (de tu app)</label>
              <input type="text" value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 6))} disabled={processing}
                placeholder="123456" inputMode="numeric"
                style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 18, fontFamily: "monospace", textAlign: "center", letterSpacing: "0.3em" }} />
            </div>
            {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <button type="button" onClick={() => { setView("overview"); setError(""); setPassword(""); setCode(""); }} disabled={processing}
                style={{ flex: 1, padding: 12, borderRadius: 10, border: "1px solid #e2e8f0", background: "#fff", color: "#475569", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Cancelar</button>
              <button type="submit" disabled={processing || !password || code.length !== 6}
                style={{ flex: 1, padding: 12, borderRadius: 10, border: "none", background: processing || !password || code.length !== 6 ? "#94a3b8" : "#dc2626", color: "#fff", fontSize: 13, fontWeight: 700, cursor: processing || !password || code.length !== 6 ? "not-allowed" : "pointer" }}>
                {processing ? "Desactivando..." : "Desactivar 2FA"}
              </button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}
 // ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
// ⭐ FASE C — DELETE EMPRESA MODAL
// Modal destructivo de 3 pasos para que el master+owner solicite eliminación
// de la empresa. La eliminación NO es inmediata: hay 30 días de gracia (banner amarillo).
// 
// PASO A (warning + confirmación textual):
//   - Lista de consecuencias
//   - Campo "escribí ELIMINAR <NIT>" — botón habilitado solo si matchea exacto
// 
// PASO B (verificación 2FA):
//   - Código 6 dígitos del Authenticator
//   - POST /api/empresa/request-deletion con { nit, totp_code }
//   - Backend valida + UPDATE empresas SET deleted_at = NOW()
// 
// PASO C (success):
//   - "✓ Marcada para eliminación"
//   - "Tenés 30 días para cancelar desde el banner amarillo"
// 
// Props:
//   - session: { nit, ... }
//   - authFetch: helper heredado
//   - onSuccess: callback con ISO timestamp (para que el banner aparezca runtime)
//   - onClose: callback de cierre
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function DeleteEmpresaModal({ session, authFetch, onSuccess, onClose }) {
  const [step, setStep] = useState("warning"); // warning | verify_2fa | success
  const [confirmText, setConfirmText] = useState("");
  const [totpCode, setTotpCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [deletedAtIso, setDeletedAtIso] = useState(null);
  const expectedConfirm = `ELIMINAR ${session.nit}`;
  const matchesConfirm = confirmText.trim().toUpperCase() === expectedConfirm;
  function handleStartVerify() {
    if (!matchesConfirm) return;
    setError("");
    setStep("verify_2fa");
  }
  async function handleConfirmDelete(e) {
    e.preventDefault();
    setError("");
    if (!/^\d{6}$/.test(totpCode)) {
      setError("Ingresa el código de 6 dígitos de tu app de autenticación");
      return;
    }
    setLoading(true);
    try {
      const { data } = await authFetch(CONFIG.EMPRESA_REQUEST_DELETION_URL, {
        method: "POST",
        body: JSON.stringify({
          nit: session.nit,
          totp_code: totpCode.trim(),
        }),
      });
      if (data?.ok) {
        const iso = data.deleted_at || new Date().toISOString();
        setDeletedAtIso(iso);
        setStep("success");
        if (onSuccess) onSuccess(iso);
      } else {
        setError(data?.message || "No se pudo procesar la eliminación. Verificá el código y volvé a intentar.");
        setTotpCode("");
      }
    } catch (e) {
      if (e.message !== "SESSION_EXPIRED") {
        setError(e.message || "Error de conexión.");
      }
    } finally {
      setLoading(false);
    }
  }
  // ─── PASO A: WARNING + CONFIRMACIÓN TEXTUAL ───
  const renderWarning = () => (
    <div>
      <div style={{ background: "#fef2f2", border: "2px solid #fecaca", borderRadius: 12, padding: 18, marginBottom: 18 }}>
        <div style={{ fontSize: 14, fontWeight: 800, color: "#991b1b", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 22 }}>⚠</span>
          Acción permanente
        </div>
        <div style={{ fontSize: 12, color: "#991b1b", lineHeight: 1.7 }}>
          Si confirmás la eliminación:
          <ul style={{ margin: "8px 0 0 22px", padding: 0 }}>
            <li><strong>30 días de gracia</strong> para revertir desde el banner amarillo del dashboard</li>
            <li>Después de 30 días, <strong>todos los datos serán eliminados permanentemente</strong></li>
            <li>Sub-usuarios y otros masters perderán acceso al confirmar el cambio</li>
            <li>Facturas pendientes no se podrán causar</li>
            <li>Esta acción <strong>NO se puede deshacer</strong> después del período de gracia</li>
          </ul>
        </div>
      </div>
      <div style={{ background: "#f8fafc", borderRadius: 10, padding: 14, marginBottom: 14, border: "1px solid #e2e8f0" }}>
        <div style={{ fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 8, letterSpacing: "0.05em" }}>
          PARA CONFIRMAR, ESCRIBÍ EXACTAMENTE:
        </div>
        <div style={{ fontFamily: "monospace", fontSize: 14, fontWeight: 700, color: "#0f172a", padding: "8px 12px", background: "#fff", borderRadius: 6, border: "1px solid #e2e8f0", marginBottom: 10, letterSpacing: "0.05em" }}>
          {expectedConfirm}
        </div>
        <input
          type="text"
          value={confirmText}
          onChange={(e) => setConfirmText(e.target.value)}
          placeholder={`Ej: ${expectedConfirm}`}
          autoFocus
          style={{
            width: "100%", padding: "10px 14px", borderRadius: 10,
            border: `1px solid ${matchesConfirm ? "#86efac" : "#e2e8f0"}`,
            background: matchesConfirm ? "#f0fdf4" : "#fff",
            fontSize: 13, fontFamily: "monospace", letterSpacing: "0.05em",
            boxSizing: "border-box",
          }}
        />
        {confirmText && !matchesConfirm && (
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 4 }}>
            Debe coincidir exactamente con el texto de arriba (mayúsculas)
          </div>
        )}
        {matchesConfirm && (
          <div style={{ fontSize: 10, color: "#16a34a", marginTop: 4, fontWeight: 600 }}>
            ✓ Texto correcto
          </div>
        )}
      </div>
      {error && (
        <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>
          {error}
        </div>
      )}
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
        <button type="button" onClick={onClose} style={{ padding: "10px 18px", borderRadius: 8, border: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", color: "#475569", fontFamily: "inherit" }}>
          Cancelar
        </button>
        <button
          type="button"
          onClick={handleStartVerify}
          disabled={!matchesConfirm}
          style={{
            padding: "10px 24px", borderRadius: 8, border: "none",
            background: !matchesConfirm ? "#fca5a5" : "#dc2626",
            color: "#fff", fontSize: 13, fontWeight: 700,
            cursor: !matchesConfirm ? "not-allowed" : "pointer",
            fontFamily: "inherit",
          }}
        >
          Continuar →
        </button>
      </div>
    </div>
  );
  // ─── PASO B: VERIFICACIÓN 2FA ───
  const renderVerify2FA = () => (
    <form onSubmit={handleConfirmDelete}>
      <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 12, color: "#92400e", lineHeight: 1.5 }}>
        🔐 <strong>Verificación de seguridad</strong>. Por la criticidad de esta acción, necesitamos validar tu identidad con 2FA. Ingresá el código de 6 dígitos de tu app.
      </div>
      <div style={{ marginBottom: 16 }}>
        <label style={{ display: "block", fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 6, letterSpacing: "0.05em" }}>
          CÓDIGO DE 6 DÍGITOS
        </label>
        <input
          type="text"
          value={totpCode}
          onChange={(e) => setTotpCode(e.target.value.replace(/\D/g, "").slice(0, 6))}
          placeholder="123456"
          autoFocus
          disabled={loading}
          inputMode="numeric"
          autoComplete="one-time-code"
          style={{ width: "100%", padding: "14px 16px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 24, fontFamily: "monospace", textAlign: "center", letterSpacing: "0.4em", boxSizing: "border-box" }}
        />
      </div>
      {error && (
        <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>
          {error}
        </div>
      )}
      <div style={{ display: "flex", gap: 10, justifyContent: "space-between" }}>
        <button type="button" onClick={() => { setStep("warning"); setError(""); setTotpCode(""); }} disabled={loading} style={{ padding: "10px 18px", borderRadius: 8, border: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", color: "#475569", fontFamily: "inherit" }}>
          ← Volver
        </button>
        <div style={{ display: "flex", gap: 10 }}>
          <button type="button" onClick={onClose} disabled={loading} style={{ padding: "10px 18px", borderRadius: 8, border: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", color: "#475569", fontFamily: "inherit" }}>
            Cancelar
          </button>
          <button type="submit" disabled={loading || totpCode.length !== 6} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: loading || totpCode.length !== 6 ? "#fca5a5" : "#dc2626", color: "#fff", fontSize: 13, fontWeight: 700, cursor: loading || totpCode.length !== 6 ? "not-allowed" : "pointer", fontFamily: "inherit" }}>
            {loading ? <span><span className="spin">⟳</span> Procesando...</span> : "🗑 Confirmar eliminación"}
          </button>
        </div>
      </div>
    </form>
  );
  // ─── PASO C: SUCCESS ───
  const renderSuccess = () => (
    <div>
      <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 12, padding: 18, marginBottom: 16 }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: "#92400e", marginBottom: 8 }}>
          ✓ Empresa marcada para eliminación
        </div>
        <div style={{ fontSize: 13, color: "#92400e", lineHeight: 1.6 }}>
          Tu solicitud quedó registrada. Tenés <strong>30 días</strong> para cancelar la eliminación desde el banner amarillo que ahora aparece en el dashboard.
          <br /><br />
          Después de los 30 días, la empresa y todos sus datos se eliminarán <strong>permanentemente</strong>.
        </div>
      </div>
      <div style={{ background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 12, color: "#0369a1", lineHeight: 1.5 }}>
        💡 <strong>Tip:</strong> Si cambiás de opinión, click "✕ Cancelar eliminación" en el banner amarillo del dashboard. El cambio es inmediato.
      </div>
      <button onClick={onClose} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: "#0f172a", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
        Cerrar
      </button>
    </div>
  );
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="fade-in" style={{ background: "#fff", borderRadius: 16, padding: 32, maxWidth: 520, width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 25px 80px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#dc2626", fontWeight: 700 }}>ZONA DE PELIGRO</div>
            <div style={{ fontSize: 18, fontWeight: 800, marginTop: 4, color: "#0f172a" }}>
              {step === "success" ? "✓ Eliminación programada" : "🗑 Eliminar empresa"}
            </div>
          </div>
          <button onClick={onClose} style={{ background: "#f1f5f9", border: "none", borderRadius: 8, width: 32, height: 32, fontSize: 16, cursor: "pointer", color: "#64748b" }}>×</button>
        </div>
        {step === "warning" && renderWarning()}
        {step === "verify_2fa" && renderVerify2FA()}
        {step === "success" && renderSuccess()}
      </div>
    </div>
  );
}
