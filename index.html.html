function Badge({ status, registradoEnErp }) {
  // Caso especial: APROBADA pero con causación fallida → marca como "Reintentable"
  if (status === "APROBADA" && registradoEnErp === "FALLIDA") {
    return <span style={{ background: "#fef2f2", color: "#991b1b", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", border: "1px solid #fecaca" }}>⚠ Reintentar</span>;
  }
  const S = {
    APROBADA: { bg: "#dcfce7", color: "#166534", label: "Aprobada" },
    APROBADA_AUTOMATICAMENTE: { bg: "#dbeafe", color: "#1e40af", label: "Auto-aprobada" },
    CAUSADA: { bg: "#f0fdf4", color: "#14532d", label: "✓ Causada" },
  };
  const s = S[status] || { bg: "#fef3c7", color: "#92400e", label: status };
  return <span style={{ background: s.bg, color: s.color, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{s.label}</span>;
}

// ⭐ FASE 3 — Badge para estados de rechazo (4 estados)
function RechazoBadge({ estado }) {
  const S = {
    RECHAZO_PENDIENTE:  { bg: "#fef3c7", color: "#92400e", label: "⏳ Pendiente rechazo" },
    RECHAZADA_DIAN:     { bg: "#fee2e2", color: "#991b1b", label: "✗ Rechazada (RADIAN 031)" },
    RECHAZADA_INTERNA:  { bg: "#f1f5f9", color: "#475569", label: "🚫 Rechazada (interna)" },
    RECHAZO_FALLIDO:    { bg: "#fef2f2", color: "#dc2626", label: "⚠ Rechazo falló", border: "1px solid #dc2626" },
  };
  const s = S[estado] || { bg: "#f1f5f9", color: "#475569", label: estado || "—" };
  return (
    <span style={{
      background: s.bg, color: s.color,
      padding: "3px 10px", borderRadius: 20,
      fontSize: 11, fontWeight: 700, whiteSpace: "nowrap",
      border: s.border || "none",
    }}>{s.label}</span>
  );
}

function Risk({ level, score }) {
  const c = { bajo: "#16a34a", medio: "#f59e0b", alto: "#ef4444" }[level] || "#6b7280";
  return <span style={{ color: c, fontWeight: 600, fontSize: 12 }}>{score}/100 {(level || "").toUpperCase()}</span>;
}

function Field({ label, value, mono }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 13, color: "#0f172a", fontFamily: mono ? "'Courier New', monospace" : "inherit", wordBreak: mono ? "break-all" : "normal", lineHeight: 1.4 }}>{value || "—"}</div>
    </div>
  );
}

function SelectField({ label, value, opts, onChange, required, disabled, emptyMsg }) {
  return (
    <div>
      <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 4 }}>{label} {required && <span style={{ color: "#ef4444" }}>*</span>}</div>
      <select value={value} onChange={(e) => onChange(e.target.value)} disabled={disabled || opts.length === 0} style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, background: disabled || opts.length === 0 ? "#f8fafc" : "#fff", cursor: disabled || opts.length === 0 ? "not-allowed" : "pointer", boxSizing: "border-box" }}>
        <option value="">{opts.length === 0 ? (emptyMsg || "Conecta el API para ver opciones") : "Seleccionar..."}</option>
        {opts.map((o) => <option key={typeof o === 'string' ? o : o.id} value={typeof o === 'string' ? o : o.id}>{typeof o === 'string' ? o : o.label}</option>)}
      </select>
    </div>
  );
}

function TaxLine({ label, amount, percent, warn }) {
  if (!amount || amount <= 0) return null;
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 12, color: warn ? "#92400e" : "#475569" }}>
      <span>{label}{percent > 0 ? ` (${percent}%)` : ""}</span>
      <span style={{ fontWeight: 600 }}>{warn ? "-" : ""}{fmt(amount)}</span>
    </div>
  );
}

function AiInsights({ inv }) {
  return (
    <div style={{ background: "linear-gradient(135deg, #f5f3ff, #eef2ff)", borderRadius: 10, padding: 14, border: "1px solid #ddd6fe", marginBottom: 16 }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: "#6d28d9", letterSpacing: "0.1em", marginBottom: 10 }}>🧠 ANÁLISIS AUTOMÁTICO</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, fontSize: 12 }}>
        <div><div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>CATEGORÍA IA</div><div style={{ fontWeight: 600 }}>{inv.categoria || "—"}</div>{inv.subcategoria && <div style={{ fontSize: 11, color: "#6d28d9" }}>{inv.subcategoria}</div>}</div>
        <div><div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>TIPO CONTABLE</div><div style={{ fontWeight: 600 }}>{inv.tipo_contable || "—"}</div></div>
        <div><div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>DEPARTAMENTO SUGERIDO</div><div style={{ fontWeight: 600 }}>{inv.departamento_asignado || "—"}</div></div>
        <div><div style={{ color: "#64748b", fontSize: 10, marginBottom: 2 }}>NIVEL DE RIESGO</div><div><Risk level={inv.risk_level} score={inv.risk_score} /></div></div>
      </div>
      {inv.tipo_contable_razon && (<div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #ddd6fe", fontSize: 11, color: "#475569", fontStyle: "italic" }}>💡 {inv.tipo_contable_razon}</div>)}
    </div>
  );
}

function DianStatus({ cufe, credentials, authFetch, nit }) {
  const [status, setStatus] = useState("idle");
  const [detail, setDetail] = useState("");
  useEffect(() => {
    if (!credentials?.dianUrl) { setStatus("no_creds"); return; }
    if (!cufe) return;
    setStatus("checking");
    authFetch(CONFIG.DIAN_VALIDATE_URL, {
      method: "POST",
      body: JSON.stringify({ nit, cufe, dianUrl: credentials.dianUrl })
    })
      .then(({ data }) => { setStatus(data.valid ? "valid" : "invalid"); setDetail(data.message || ""); })
      .catch((e) => {
        if (e.message !== 'SESSION_EXPIRED') { setStatus("invalid"); setDetail("No se pudo validar"); }
      });
  }, [cufe, credentials?.dianUrl]);
  if (status === "no_creds") return <div style={{ padding: "8px 14px", borderRadius: 8, background: "#fef3c7", border: "1px solid #fbbf24", fontSize: 12, color: "#92400e" }}>⚠ Conecta el API DIAN para validación automática</div>;
  if (status === "checking") return <div style={{ padding: "8px 14px", borderRadius: 8, background: "#f8fafc", border: "1px solid #e2e8f0", fontSize: 12, color: "#64748b" }}><span className="spin">⟳</span> Validando en DIAN...</div>;
  if (status === "valid") return <div style={{ padding: "8px 14px", borderRadius: 8, background: "#dcfce7", border: "1px solid #86efac", fontSize: 12, color: "#166534", fontWeight: 600 }}>✓ Validada por DIAN {detail && `· ${detail}`}</div>;
  return <div style={{ padding: "8px 14px", borderRadius: 8, background: "#fef2f2", border: "1px solid #fecaca", fontSize: 12, color: "#991b1b" }}>✗ No validada {detail && `· ${detail}`}</div>;
}

function StatCard({ label, value, color, icon, subtitle }) {
  return (
    <div style={{ background: "#fff", borderRadius: 12, padding: "16px 18px", border: "1px solid #e2e8f0", flex: 1, minWidth: 160 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <span style={{ fontSize: 16 }}>{icon}</span>
        <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em" }}>{label}</div>
      </div>
      <div style={{ fontSize: 22, fontWeight: 800, color: color || "#0f172a" }}>{value}</div>
      {subtitle && <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>{subtitle}</div>}
    </div>
  );
}

function EmptyState({ icon, title, message }) {
  return (
    <div style={{ textAlign: "center", padding: "80px 20px", background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>{icon}</div>
      <div style={{ fontSize: 16, fontWeight: 700, color: "#334155", marginBottom: 8 }}>{title}</div>
      <div style={{ fontSize: 13, color: "#94a3b8", maxWidth: 400, margin: "0 auto", lineHeight: 1.5 }}>{message}</div>
    </div>
  );
}

// ⭐ FASE 3 — RECHAZO INFO VIEW (vista para facturas YA rechazadas, reemplaza InvoiceDetail en filas expandidas)
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function RechazoInfoView({ inv }) {
  const isDian = inv.estado === "RECHAZADA_DIAN";
  const isFallido = inv.estado === "RECHAZO_FALLIDO";
  const panelBg = isFallido ? "#fef2f2" : (isDian ? "#fef2f2" : "#f8fafc");
  const panelBorder = isFallido ? "#fecaca" : (isDian ? "#fecaca" : "#e2e8f0");
  const panelTextColor = isFallido ? "#991b1b" : (isDian ? "#991b1b" : "#475569");
  return (
    <div style={{ padding: "20px 24px", background: "#fafbfc", borderTop: "1px solid #e2e8f0" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
        <Field label="RECEPTOR" value={inv.receptor || inv.emisor} />
        <Field label="NIT" value={inv.nit_emisor} mono />
        <Field label="FECHA EMISIÓN" value={dateStr(inv.fecha_emision)} />
      </div>
      <div style={{ marginBottom: 16 }}>
        <Field label="CUFE" value={inv.cufe} mono />
      </div>

      <div style={{
        background: panelBg, border: `1px solid ${panelBorder}`, borderRadius: 12,
        padding: 18, marginBottom: 14
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 10, fontWeight: 700, color: panelTextColor, letterSpacing: "0.1em", marginBottom: 4 }}>
              {isDian ? "🛑 RECHAZADA EN DIAN (RADIAN 031)" : isFallido ? "⚠ RECHAZO FALLÓ" : "🚫 RECHAZADA INTERNAMENTE"}
            </div>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#0f172a" }}>{motivoLabelByKey(inv.motivo_rechazo)}</div>
          </div>
          <RechazoBadge estado={inv.estado} />
        </div>

        {inv.descripcion_rechazo && (
          <div style={{ background: "#fff", borderRadius: 8, padding: "10px 12px", marginBottom: 10, border: "1px solid #e2e8f0" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "0.05em", marginBottom: 4 }}>DESCRIPCIÓN</div>
            <div style={{ fontSize: 13, color: "#334155", lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{inv.descripcion_rechazo}</div>
          </div>
        )}

        {inv.fecha_rechazo && (
          <div style={{ fontSize: 11, color: "#64748b", marginBottom: 8 }}>
            <strong>Fecha de rechazo:</strong> {dateStr(inv.fecha_rechazo)} · {new Date(inv.fecha_rechazo).toLocaleTimeString("es-CO")}
            {inv.rechazo_decided_by && <> · por <strong>{inv.rechazo_decided_by}</strong></>}
          </div>
        )}

        {isDian && inv.dian_event_id && (
          <div style={{ background: "#fff", borderRadius: 8, padding: "10px 12px", border: "1px solid #fecaca", marginTop: 10 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#991b1b", letterSpacing: "0.05em", marginBottom: 6 }}>📡 EVENTO RADIAN 031</div>
            <div style={{ fontSize: 12, fontFamily: "'Courier New', monospace", color: "#334155", wordBreak: "break-all", marginBottom: 6 }}>
              <strong>ID:</strong> {inv.dian_event_id}
            </div>
            {inv.dian_attached_doc_url && (
              <a href={inv.dian_attached_doc_url} target="_blank" rel="noopener noreferrer"
                style={{ display: "inline-block", padding: "6px 12px", background: "#0f172a", color: "#fff", borderRadius: 6, fontSize: 11, fontWeight: 700, textDecoration: "none" }}>
                📎 Ver documento adjunto
              </a>
            )}
          </div>
        )}

        {isFallido && inv.rechazo_error_msg && (
          <div style={{ background: "#fee2e2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 12px", marginTop: 10 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#991b1b", letterSpacing: "0.05em", marginBottom: 4 }}>ERROR DEL SISTEMA</div>
            <div style={{ fontSize: 12, color: "#991b1b", fontFamily: "'Courier New', monospace", whiteSpace: "pre-wrap" }}>{inv.rechazo_error_msg}</div>
            {inv.rechazo_retry_count > 0 && (
              <div style={{ fontSize: 11, color: "#991b1b", marginTop: 6 }}>Reintentos: {inv.rechazo_retry_count}</div>
            )}
          </div>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="SUBTOTAL" value={fmt(inv.subtotal)} />
        <Field label="TOTAL" value={fmt(inv.total)} />
      </div>
    </div>
  );

// ⭐ FASE 3 — RECHAZO TARJETA (card editable de cada factura pendiente de rechazo en la bandeja)
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function RechazoTarjeta({ factura, aiData, aiLoading, selected, onToggleSelect, motivo, onMotivoChange, descripcion, onDescripcionChange, blocked }) {
  // Soportar nombres ingleses (backend nuevo) y españoles (legacy)
  const conf = aiData ? (typeof aiData.confidence === "number" ? aiData.confidence : aiData.confianza) : null;
  const confLevel = aiData ? getConfLevel(conf) : "low";
  const confColor = CONF_COLORS[confLevel];
  const confPct = typeof conf === "number" ? Math.round(conf * 100) : null;
  const razonamiento = aiData?.razonamiento || aiData?.reasoning || aiData?.reason || "";

  // PRIORIDAD: si la IA decidió applies_radian explícitamente, respetarlo
  let esRadian;
  if (aiData && typeof aiData.applies_radian === "boolean") {
    esRadian = aiData.applies_radian;
  } else {
    esRadian = decidirTipoRechazo(factura, aiData) === "RADIAN";
  }

  return (
    <div className="fade-in" style={{
      background: "#fff", borderRadius: 12, border: `1px solid ${selected ? "#3b82f6" : "#e2e8f0"}`,
      padding: 18, marginBottom: 12, boxShadow: selected ? "0 0 0 2px rgba(59,130,246,0.15)" : "none",
      opacity: blocked && !selected ? 0.7 : 1, transition: "all 0.2s"
    }}>
      {/* Header con checkbox + factura info + badge */}
      <div style={{ display: "flex", alignItems: "flex-start", gap: 14, marginBottom: 14 }}>
        <input
          type="checkbox"
          checked={selected}
          onChange={onToggleSelect}
          disabled={blocked}
          style={{ width: 18, height: 18, marginTop: 4, cursor: blocked ? "not-allowed" : "pointer", accentColor: "#3b82f6" }}
        />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, marginBottom: 4 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: "#0f172a", marginBottom: 2 }}>
                {factura.numero_factura || "—"}
              </div>
              <div style={{ fontSize: 12, color: "#475569", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {factura.emisor || "—"} · NIT {factura.nit_emisor || "—"}
              </div>
            </div>
            <div style={{ textAlign: "right", flexShrink: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: "#0f172a" }}>{fmt(factura.total)}</div>
              <div style={{ marginTop: 4 }}><RechazoBadge estado={factura.estado} /></div>
            </div>
          </div>
          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>
            CUFE: <span style={{ fontFamily: "monospace" }}>{factura.cufe?.slice(0, 24)}…</span> · Emitida {dateStr(factura.fecha_emision)}
          </div>
        </div>
      </div>

      {/* Banner confianza IA */}
      {aiLoading && (
        <div style={{ padding: "10px 14px", borderRadius: 8, background: "#f8fafc", border: "1px solid #e2e8f0", fontSize: 12, color: "#64748b", marginBottom: 12 }}>
          <span className="spin">⟳</span> Analizando factura con IA...
        </div>
      )}
      {!aiLoading && aiData && (
        <div style={{
          padding: "10px 14px", borderRadius: 8,
          background: confColor.bg, border: `1px solid ${confColor.border}`,
          fontSize: 12, color: confColor.text, marginBottom: 12, lineHeight: 1.5
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontWeight: 700 }}>🧠 IA: {confColor.label}</span>
            {confPct !== null && <span style={{ fontWeight: 800 }}>{confPct}%</span>}
          </div>
          {razonamiento && <div style={{ fontSize: 11 }}>{razonamiento}</div>}
        </div>
      )}

      {/* Banner tipo rechazo (RADIAN vs Interno) */}
      <div style={{
        padding: "8px 12px", borderRadius: 6,
        background: esRadian ? "#fee2e2" : "#f1f5f9",
        border: `1px solid ${esRadian ? "#fecaca" : "#cbd5e1"}`,
        fontSize: 11, color: esRadian ? "#991b1b" : "#475569",
        marginBottom: 12, display: "flex", alignItems: "center", gap: 6
      }}>
        {esRadian ? (
          <>📡 <strong>Se enviará a DIAN como evento RADIAN 031.</strong> Plazo legal: 3 días hábiles desde recepción.</>
        ) : (
          <>💵 <strong>Rechazo interno.</strong> No se envía a DIAN (factura ya pagada de contado o fuera de plazo RADIAN).</>
        )}
      </div>

      {/* Editor: motivo + descripción */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 10, marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 4 }}>
            MOTIVO <span style={{ color: "#ef4444" }}>*</span>
          </div>
          <select
            value={motivo}
            onChange={(e) => onMotivoChange(e.target.value)}
            style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, background: "#fff", boxSizing: "border-box" }}
          >
            <option value="">Seleccionar motivo...</option>
            {MOTIVOS_RECHAZO.map(m => (
              <option key={m.key} value={m.key}>{m.label}</option>
            ))}
          </select>
        </div>
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
            <span style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em" }}>
              DESCRIPCIÓN <span style={{ color: "#ef4444" }}>*</span>
            </span>
            <span style={{ fontSize: 10, color: descripcion.length > 450 ? "#dc2626" : "#94a3b8" }}>
              {descripcion.length}/500
            </span>
          </div>
          <textarea
            value={descripcion}
            onChange={(e) => onDescripcionChange(e.target.value.slice(0, 500))}
            placeholder="Explica claramente el motivo del rechazo (visible para el emisor en RADIAN)..."
            rows={3}
            style={{
              width: "100%", padding: "9px 12px", borderRadius: 8,
              border: "1px solid #e2e8f0", fontSize: 13,
              fontFamily: "inherit", resize: "vertical", boxSizing: "border-box", lineHeight: 1.5
            }}
          />
        </div>
      </div>

      {/* Evidencia de la IA */}
      {aiData?.evidencia && Array.isArray(aiData.evidencia) && aiData.evidencia.length > 0 && (
        <div style={{ marginTop: 8, padding: "8px 12px", background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 8, fontSize: 11, color: "#0369a1" }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>🔍 Evidencia detectada:</div>
          <ul style={{ margin: 0, paddingLeft: 18, lineHeight: 1.5 }}>
            {aiData.evidencia.map((e, i) => <li key={i}>{e}</li>)}
          </ul>
        </div>
      )}

      {/* Warnings de la IA */}
      {aiData?.warnings && Array.isArray(aiData.warnings) && aiData.warnings.length > 0 && (
        <div style={{ marginTop: 8, padding: "8px 12px", background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 8, fontSize: 11, color: "#92400e" }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>⚠ Advertencias:</div>
          <ul style={{ margin: 0, paddingLeft: 18, lineHeight: 1.5 }}>
            {aiData.warnings.map((w, i) => <li key={i}>{w}</li>)}
          </ul>
        </div>
      )}

      {blocked && (
        <div style={{ marginTop: 10, padding: "8px 12px", background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, fontSize: 11, color: "#991b1b" }}>
          🔒 Confianza muy baja (&lt;{Math.round(CONFIDENCE_BLOCKED * 100)}%). Edita motivo y descripción manualmente para habilitar la selección.
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
// ⭐ FASE 3 — RECHAZO CONFIRM MODAL (escribir "ENVIAR" para confirmar bulk)
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function RechazoConfirmModal({ items, onConfirm, onClose, processing }) {
  const [confirmText, setConfirmText] = useState("");
  const isReady = confirmText === "ENVIAR";
  const totalAmount = items.reduce((s, x) => s + (Number(x.factura.total) || 0), 0);
  const radianCount = items.filter(x => decidirTipoRechazo(x.factura, x.aiData) === "RADIAN").length;
  const internoCount = items.length - radianCount;

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", backdropFilter: "blur(4px)",
      zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20
    }}>
      <div className="fade-in" style={{
        background: "#fff", borderRadius: 16, padding: 28, maxWidth: 580, width: "100%",
        maxHeight: "90vh", overflowY: "auto", boxShadow: "0 25px 80px rgba(0,0,0,0.4)"
      }}>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#64748b", fontWeight: 600 }}>CONFIRMAR RECHAZO MASIVO</div>
          <div style={{ fontSize: 18, fontWeight: 800, marginTop: 4, color: "#0f172a" }}>
            🚫 Vas a rechazar {items.length} factura{items.length !== 1 ? "s" : ""}
          </div>
        </div>

        <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10, padding: 14, marginBottom: 16, fontSize: 12, color: "#991b1b", lineHeight: 1.6 }}>
          <strong>⚠ Acción irreversible.</strong> Una vez enviada al RADIAN 031, el rechazo no se puede deshacer desde este sistema.
          {radianCount > 0 && <><br />📡 <strong>{radianCount}</strong> factura{radianCount !== 1 ? "s" : ""} se enviará{radianCount !== 1 ? "n" : ""} a DIAN.</>}
          {internoCount > 0 && <><br />💵 <strong>{internoCount}</strong> rechazo{internoCount !== 1 ? "s" : ""} interno{internoCount !== 1 ? "s" : ""} (no van a DIAN).</>}
        </div>

        <div style={{ background: "#f8fafc", borderRadius: 10, padding: 12, marginBottom: 16, maxHeight: 240, overflowY: "auto", border: "1px solid #e2e8f0" }}>
          {items.map((x, i) => (
            <div key={x.factura.cufe} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "8px 0", borderBottom: i < items.length - 1 ? "1px solid #e2e8f0" : "none", fontSize: 12
            }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ fontWeight: 700, color: "#0f172a" }}>{x.factura.numero_factura}</div>
                <div style={{ color: "#64748b", fontSize: 11, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                  {motivoLabelByKey(x.motivo)} · {x.factura.emisor}
                </div>
              </div>
              <div style={{ fontWeight: 700, color: "#0f172a", marginLeft: 12 }}>{fmt(x.factura.total)}</div>
            </div>
          ))}
          <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0 4px", borderTop: "2px solid #cbd5e1", marginTop: 4, fontSize: 13, fontWeight: 800 }}>
            <span>TOTAL</span>
            <span>{fmt(totalAmount)}</span>
          </div>
        </div>

        <div style={{ marginBottom: 16 }}>
          <label style={{ display: "block", fontSize: 11, color: "#475569", fontWeight: 600, marginBottom: 6 }}>
            Para confirmar, escribe <strong style={{ fontFamily: "monospace", color: "#dc2626" }}>ENVIAR</strong>:
          </label>
          <input
            type="text"
            value={confirmText}
            onChange={(e) => setConfirmText(e.target.value)}
            placeholder="ENVIAR"
            disabled={processing}
            autoFocus
            style={{
              width: "100%", padding: "10px 14px", borderRadius: 10,
              border: `1px solid ${isReady ? "#16a34a" : "#e2e8f0"}`, fontSize: 14,
              fontFamily: "monospace", textAlign: "center", letterSpacing: "0.2em",
              background: isReady ? "#f0fdf4" : "#fff", boxSizing: "border-box"
            }}
          />
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onClose} disabled={processing}
            style={{ padding: "10px 18px", borderRadius: 8, border: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 600, cursor: processing ? "not-allowed" : "pointer", color: "#475569" }}>
            Cancelar
          </button>
          <button
            onClick={onConfirm}
            disabled={!isReady || processing}
            style={{
              padding: "10px 24px", borderRadius: 8, border: "none",
              background: !isReady || processing ? "#94a3b8" : "#dc2626",
              color: "#fff", fontSize: 13, fontWeight: 700,
              cursor: !isReady || processing ? "not-allowed" : "pointer"
            }}
          >
            {processing ? "Enviando..." : `Causar ${items.length} rechazo${items.length !== 1 ? "s" : ""}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ⭐ HELPER: extrae la recomendación del response del backend.
// Maneja 4 casos:
// 1. Objeto aplanado (backend nuevo con spread aplicado)
// 2. ai_recomendacion_json como string serializado (backend actual)
// 3. Anidado en .recomendacion
// 4. Array de un elemento (n8n a veces empaqueta así)
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function extractRecomendacion(data) {
  if (!data) return null;
  if (Array.isArray(data) && data.length > 0) return extractRecomendacion(data[0]);
  // Caso 1: ya viene aplanado (con confidence en inglés o confianza en español)
  if (typeof data.confidence === "number" || typeof data.confianza === "number") {
    return data;
  }
  // Caso 2: viene como string serializado
  if (typeof data.ai_recomendacion_json === "string") {
    try { return JSON.parse(data.ai_recomendacion_json); }
    catch (e) { return null; }
  }
  // Caso 3: anidado
  if (data.recomendacion && typeof data.recomendacion === "object") {
    return data.recomendacion;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
// ⭐ FASE 3 — RECHAZOS BANDEJA (vista principal de la pestaña 🚫 Rechazos)
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function RechazosBandeja({ session, authFetch, facturas, onRefresh }) {
  const pendientes = useMemo(
    () => (facturas || []).filter(f => f.estado === "RECHAZO_PENDIENTE"),
    [facturas]
  );

  const [aiCache, setAiCache] = useState({});       // { cufe: { confianza, motivo_sugerido, descripcion_sugerida, ... } }
  const [aiLoading, setAiLoading] = useState({});    // { cufe: bool }
  const [selections, setSelections] = useState({}); // { cufe: bool }
  const [motivos, setMotivos] = useState({});       // { cufe: motivoKey }
  const [descripciones, setDescripciones] = useState({}); // { cufe: string }
  const [showConfirm, setShowConfirm] = useState(false);
  const [processing, setProcessing] = useState(false);

  // Auto-fetch recomendaciones al montar / cuando cambia la lista de pendientes
  useEffect(() => {
    let cancelled = false;
    pendientes.forEach(async (f) => {
      const cufe = f.cufe;
      if (!cufe || aiCache[cufe] || aiLoading[cufe]) return;

      // 1) Cache desde Sheets — usa extractRecomendacion para parsear robustamente
      if (f.ai_recomendacion_json) {
        const parsed = extractRecomendacion(f);
        if (parsed && typeof parsed === "object") {
          if (cancelled) return;
          setAiCache(prev => ({ ...prev, [cufe]: parsed }));
          applyAiData(cufe, parsed);
          return;
        }
      }

      // 2) Fetch al webhook
      setAiLoading(prev => ({ ...prev, [cufe]: true }));
      try {
        const { data } = await authFetch(CONFIG.RECHAZO_RECOMENDAR_URL, {
          method: "POST",
          body: JSON.stringify({ nit: session.nit, cufe }),
        });
        if (cancelled) return;
        // Extraer la recomendación sea cual sea el formato del backend
        const rec = extractRecomendacion(data);
        if (rec) {
          setAiCache(prev => ({ ...prev, [cufe]: rec }));
          applyAiData(cufe, rec);
        }
      } catch (e) {
        if (e.message !== "SESSION_EXPIRED") console.warn("Error obteniendo recomendación:", e.message);
      } finally {
        if (!cancelled) setAiLoading(prev => ({ ...prev, [cufe]: false }));
      }
    });
    return () => { cancelled = true; };
    // eslint-disable-next-line
  }, [pendientes.map(f => f.cufe).join("|")]);

  function applyAiData(cufe, data) {
    if (!data) return;
    // Backend devuelve campos en inglés (motivo_codigo, confidence)
    // Soportar legacy (motivo_sugerido, confianza) por compatibilidad
    const motivoCodigo = data.motivo_codigo || data.motivo_sugerido;
    const desc = data.descripcion_sugerida || data.motivo_dian;
    const conf = typeof data.confidence === "number" ? data.confidence : data.confianza;

    if (motivoCodigo) {
      setMotivos(prev => prev[cufe] ? prev : { ...prev, [cufe]: motivoCodigo });
    }
    if (desc && typeof desc === "string" && desc.trim().length > 0) {
      setDescripciones(prev => prev[cufe] ? prev : { ...prev, [cufe]: desc });
    }
    if (typeof conf === "number" && conf >= CONFIDENCE_AUTO_SELECT) {
      setSelections(prev => prev[cufe] !== undefined ? prev : { ...prev, [cufe]: true });
    }
  }

  const highConfidenceCount = useMemo(() =>
    pendientes.filter(f => {
      const a = aiCache[f.cufe];
      const conf = a ? (typeof a.confidence === "number" ? a.confidence : a.confianza) : null;
      return typeof conf === "number" && conf >= CONFIDENCE_AUTO_SELECT;
    }).length
  , [pendientes, aiCache]);

  const selectedCufes = useMemo(() =>
    Object.keys(selections).filter(c => selections[c])
  , [selections]);

  const selectedItems = useMemo(() =>
    selectedCufes.map(cufe => {
      const factura = pendientes.find(f => f.cufe === cufe);
      return factura ? {
        factura,
        aiData: aiCache[cufe],
        motivo: motivos[cufe] || "",
        descripcion: descripciones[cufe] || "",
      } : null;
    }).filter(Boolean)
  , [selectedCufes, pendientes, aiCache, motivos, descripciones]);

  const selectedTotal = useMemo(() =>
    selectedItems.reduce((s, x) => s + (Number(x.factura.total) || 0), 0)
  , [selectedItems]);

  const canProceed = selectedItems.length > 0 && selectedItems.every(x => x.motivo && x.descripcion.trim().length >= 5);
  const validationMsg = !canProceed && selectedItems.length > 0
    ? "Cada factura seleccionada requiere motivo y descripción (mínimo 5 caracteres)"
    : "";

  function handleSelectHighConf() {
    const next = { ...selections };
    pendientes.forEach(f => {
      const a = aiCache[f.cufe];
      const conf = a ? (typeof a.confidence === "number" ? a.confidence : a.confianza) : null;
      if (typeof conf === "number" && conf >= CONFIDENCE_AUTO_SELECT) {
        next[f.cufe] = true;
      }
    });
    setSelections(next);
  }

  function handleClearSelection() {
    setSelections({});
  }

  function handleToggleSelect(cufe) {
    setSelections(prev => ({ ...prev, [cufe]: !prev[cufe] }));
  }

  async function handleConfirm() {
    setProcessing(true);
    try {
      const { data } = await authFetch(CONFIG.CAUSAR_RECHAZO_LOTE_URL, {
        method: "POST",
        body: JSON.stringify({
          nit: session.nit,
          items: selectedItems.map(x => ({
            cufe: x.factura.cufe,
            motivo: x.motivo,
            descripcion: x.descripcion.trim(),
          })),
        }),
      });
      const succ = data?.exitos || data?.success_count || 0;
      const fail = data?.fallos || data?.failed_count || 0;
      const messages = [];
      if (succ > 0) messages.push(`✓ ${succ} rechazo${succ !== 1 ? "s" : ""} procesado${succ !== 1 ? "s" : ""} correctamente.`);
      if (fail > 0) messages.push(`⚠ ${fail} fallaron — revisa la lista para detalles.`);
      if (messages.length === 0) messages.push("Procesado. Revisa la bandeja.");
      alert(messages.join("\n"));
      setSelections({});
      setShowConfirm(false);
      if (onRefresh) await onRefresh();
    } catch (e) {
      if (e.message !== "SESSION_EXPIRED") {
        alert("Error al procesar el lote: " + e.message);
      }
    } finally {
      setProcessing(false);
    }
  }

  if (pendientes.length === 0) {
    return (
      <EmptyState
        icon="✨"
        title="No hay rechazos pendientes"
        message="Cuando rechaces facturas desde el correo de aprobación, aparecerán aquí para que las revises antes de enviarlas a DIAN."
      />
    );
  }

  return (
    <div style={{ paddingBottom: 100 }}>
      {/* Banner plazo legal */}
      <div style={{
        background: "linear-gradient(135deg, #fef3c7, #fde68a)",
        border: "1px solid #fbbf24", borderRadius: 12, padding: "14px 18px", marginBottom: 16,
        display: "flex", alignItems: "center", gap: 12
      }}>
        <span style={{ fontSize: 22 }}>⏰</span>
        <div style={{ fontSize: 12, color: "#92400e", lineHeight: 1.5 }}>
          <strong>Plazo legal:</strong> 3 días hábiles desde la recepción de la factura para rechazarla vía RADIAN 031.
          Pasado ese plazo, sólo procede rechazo interno (no se envía a DIAN).
        </div>
      </div>

      {/* Toolbar */}
      <div style={{
        background: "#fff", borderRadius: 12, padding: "12px 16px", marginBottom: 14,
        border: "1px solid #e2e8f0", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap"
      }}>
        <div style={{ fontSize: 13, color: "#475569" }}>
          <strong style={{ color: "#0f172a" }}>{pendientes.length}</strong> factura{pendientes.length !== 1 ? "s" : ""} pendiente{pendientes.length !== 1 ? "s" : ""}
          {highConfidenceCount > 0 && <> · <span style={{ color: "#16a34a", fontWeight: 700 }}>{highConfidenceCount}</span> con alta confianza IA</>}
        </div>
        <div style={{ flex: 1 }} />
        {highConfidenceCount > 0 && (
          <button onClick={handleSelectHighConf} style={{
            padding: "7px 14px", borderRadius: 8, border: "1px solid #16a34a",
            background: "#f0fdf4", color: "#15803d", fontSize: 12, fontWeight: 700, cursor: "pointer"
          }}>
            ✓ Seleccionar las {highConfidenceCount} de alta confianza
          </button>
        )}
        {selectedCufes.length > 0 && (
          <button onClick={handleClearSelection} style={{
            padding: "7px 14px", borderRadius: 8, border: "1px solid #e2e8f0",
            background: "#fff", color: "#475569", fontSize: 12, fontWeight: 600, cursor: "pointer"
          }}>
            Limpiar selección
          </button>
        )}
      </div>

      {/* Lista de tarjetas */}
      {pendientes.map(f => {
        const aiData = aiCache[f.cufe];
        const isLoading = aiLoading[f.cufe];
        const conf = aiData ? (typeof aiData.confidence === "number" ? aiData.confidence : aiData.confianza) : null;
        const blocked = typeof conf === "number" && conf < CONFIDENCE_BLOCKED && !motivos[f.cufe];
        return (
          <RechazoTarjeta
            key={f.cufe}
            factura={f}
            aiData={aiData}
            aiLoading={isLoading}
            selected={!!selections[f.cufe]}
            onToggleSelect={() => handleToggleSelect(f.cufe)}
            motivo={motivos[f.cufe] || ""}
            onMotivoChange={(v) => setMotivos(prev => ({ ...prev, [f.cufe]: v }))}
            descripcion={descripciones[f.cufe] || ""}
            onDescripcionChange={(v) => setDescripciones(prev => ({ ...prev, [f.cufe]: v }))}
            blocked={blocked}
          />
        );
      })}

      {/* Footer pegajoso */}
      {selectedCufes.length > 0 && (
        <div style={{
          position: "fixed", bottom: 0, left: 0, right: 0,
          background: "#fff", borderTop: "1px solid #e2e8f0",
          padding: "14px 24px", boxShadow: "0 -4px 20px rgba(0,0,0,0.08)",
          display: "flex", alignItems: "center", gap: 14, zIndex: 50
        }}>
          <div>
            <div style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>SELECCIONADAS</div>
            <div style={{ fontSize: 16, fontWeight: 800, color: "#0f172a" }}>
              {selectedCufes.length} factura{selectedCufes.length !== 1 ? "s" : ""} · {fmt(selectedTotal)}
            </div>
          </div>
          <div style={{ flex: 1, fontSize: 11, color: validationMsg ? "#dc2626" : "#94a3b8" }}>
            {validationMsg}
          </div>
          <button
            onClick={() => setShowConfirm(true)}
            disabled={!canProceed}
            style={{
              padding: "12px 24px", borderRadius: 10, border: "none",
              background: !canProceed ? "#94a3b8" : "#dc2626",
              color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: !canProceed ? "not-allowed" : "pointer",
              whiteSpace: "nowrap"
            }}
          >
            🚫 Causar rechazos
          </button>
        </div>
      )}

      {showConfirm && (
        <RechazoConfirmModal
          items={selectedItems}
          onConfirm={handleConfirm}
          onClose={() => !processing && setShowConfirm(false)}
          processing={processing}
        />
      )}
    </div>
  );
}

// INVOICE DETAIL (vista expandida normal — para facturas APROBADAS pendientes de causación)
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function InvoiceDetail({ inv, session, credentials, authFetch, onCausada }) {
  const [erpParams, setErpParams] = useState({ terceros: [], cuentas: [], cecos: [] });
  const [loadingParams, setLoadingParams] = useState(false);
  const [tercero, setTercero] = useState("");
  const [cuenta, setCuenta] = useState("");
  const [centroCosto, setCentroCosto] = useState("");
  const [observaciones, setObservaciones] = useState("");
  const [causando, setCausando] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    if (!credentials?.has_erp_key) return;
    setLoadingParams(true);
    authFetch(CONFIG.ERP_PARAMS_URL, {
      method: "POST",
      body: JSON.stringify({
        nit: session.nit,
        nit_emisor: inv.nit_emisor,
        // Drive-by #2 fix: backend lee body.software_contable para poder
        // devolver los PARAMS_BY_SOFTWARE correctos (Siigo/Alegra/W.Office/...)
        software_contable: session.software_contable || null,
      }),
    })
      .then(({ data }) => {
        setErpParams({
          terceros: data.terceros || [],
          cuentas: data.cuentas || [],
          cecos: data.cecos || [],
        });
        // Pre-fill if a tercero matches the emitter's NIT
        const match = (data.terceros || []).find(t => t.id === inv.nit_emisor || t.nit === inv.nit_emisor);
        if (match) setTercero(match.id);
        // Pre-fill cuenta from AI suggestion
        if (inv.cuenta_contable_sugerida && (data.cuentas || []).some(c => c.id === inv.cuenta_contable_sugerida)) {
          setCuenta(inv.cuenta_contable_sugerida);
        }
        if (inv.centro_costo_sugerido && (data.cecos || []).some(c => c.id === inv.centro_costo_sugerido)) {
          setCentroCosto(inv.centro_costo_sugerido);
        }
      })
      .catch(e => {
        if (e.message !== "SESSION_EXPIRED") console.warn("ERP params error:", e.message);
      })
      .finally(() => setLoadingParams(false));
  }, [inv.cufe, credentials?.has_erp_key]);

  async function handleCausar() {
    if (!tercero || !cuenta) { setError("Tercero y cuenta son requeridos"); return; }
    setError("");
    setCausando(true);
    try {
      const { data } = await authFetch(CONFIG.CAUSAR_URL, {
        method: "POST",
        body: JSON.stringify({
          nit: session.nit,
          cufe: inv.cufe,
          tercero, cuenta, centro_costo: centroCosto,
          observaciones,
        }),
      });
      if (!data.success) {
        setError(data.error || "Error al causar la factura");
        // Notificar al parent del fallo para actualizar el state local
        // y mostrar la vista de "Causación fallida" con el botón Reintentar.
        if (onCausada) onCausada(inv.cufe, { ...data, _failed: true });
        return;
      }
      if (onCausada) onCausada(inv.cufe, data);
    } catch (e) {
      if (e.message !== "SESSION_EXPIRED") setError(e.message);
    } finally {
      setCausando(false);
    }
  }

  return (
    <div style={{ padding: "20px 24px", background: "#fafbfc", borderTop: "1px solid #e2e8f0" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 20 }}>
        {/* IZQ — info factura + IA */}
        <div>
          <div style={{ marginBottom: 12 }}>
            <DianStatus cufe={inv.cufe} credentials={credentials} authFetch={authFetch} nit={session.nit} />
          </div>
          <AiInsights inv={inv} />
          <div style={{ background: "#fff", borderRadius: 10, padding: 16, border: "1px solid #e2e8f0", marginBottom: 12 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "0.1em", marginBottom: 10 }}>📄 DATOS DE LA FACTURA</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
              <Field label="EMISOR" value={inv.emisor} />
              <Field label="NIT EMISOR" value={inv.nit_emisor} mono />
              <Field label="Nº FACTURA" value={inv.numero_factura} />
              <Field label="FECHA EMISIÓN" value={dateStr(inv.fecha_emision)} />
              <Field label="MEDIO DE PAGO" value={inv.medio_pago} />
              <Field label="VENCIMIENTO" value={dateStr(inv.fecha_vencimiento)} />
            </div>
            <div style={{ marginTop: 4 }}>
              <Field label="CUFE" value={inv.cufe} mono />
            </div>
          </div>
          <div style={{ background: "#fff", borderRadius: 10, padding: 16, border: "1px solid #e2e8f0" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "0.1em", marginBottom: 10 }}>💰 DESGLOSE TRIBUTARIO</div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 13 }}>
              <span style={{ color: "#475569" }}>Subtotal</span>
              <span style={{ fontWeight: 700 }}>{fmt(inv.subtotal)}</span>
            </div>
            <TaxLine label="IVA" amount={inv.iva} percent={inv.iva_porcentaje} />
            <TaxLine label="ICA" amount={inv.ica} percent={inv.ica_porcentaje} />
            <TaxLine label="Retefuente" amount={inv.retefuente} percent={inv.retefuente_porcentaje} warn />
            <TaxLine label="Reteiva" amount={inv.reteiva} percent={inv.reteiva_porcentaje} warn />
            <TaxLine label="Reteica" amount={inv.reteica} percent={inv.reteica_porcentaje} warn />
            <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0 0", marginTop: 6, borderTop: "2px solid #cbd5e1", fontSize: 14, fontWeight: 800 }}>
              <span>TOTAL</span>
              <span>{fmt(inv.total)}</span>
            </div>
          </div>
        </div>

        {/* DER — editor de causación */}
        <div>
          <div style={{ background: "#fff", borderRadius: 10, padding: 16, border: "1px solid #e2e8f0" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#0369a1", letterSpacing: "0.1em", marginBottom: 12 }}>⚙ CAUSACIÓN EN {session.software_contable?.toUpperCase()}</div>

            {!credentials?.has_erp_key && (
              <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#92400e", marginBottom: 12 }}>
                ⚠ Conecta el API de tu ERP para habilitar la causación.
              </div>
            )}

            {loadingParams && (
              <div style={{ padding: 12, fontSize: 12, color: "#64748b" }}><span className="spin">⟳</span> Cargando parámetros del ERP...</div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 12 }}>
              <SelectField
                label="TERCERO"
                value={tercero}
                opts={erpParams.terceros.map(t => ({ id: t.id, label: `${t.nombre || t.razon_social || t.id}${t.nit ? ` (${t.nit})` : ""}` }))}
                onChange={setTercero}
                required
                disabled={!credentials?.has_erp_key || causando}
              />
              <SelectField
                label="CUENTA CONTABLE"
                value={cuenta}
                opts={erpParams.cuentas.map(c => ({ id: c.id, label: `${c.codigo || c.id} — ${c.nombre || c.descripcion}` }))}
                onChange={setCuenta}
                required
                disabled={!credentials?.has_erp_key || causando}
              />
              {erpParams.cecos.length > 0 && (
                <SelectField
                  label="CENTRO DE COSTO"
                  value={centroCosto}
                  opts={erpParams.cecos.map(c => ({ id: c.id, label: c.nombre || c.descripcion || c.id }))}
                  onChange={setCentroCosto}
                  disabled={!credentials?.has_erp_key || causando}
                />
              )}
              <div>
                <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: "0.05em", marginBottom: 4 }}>OBSERVACIONES</div>
                <textarea
                  value={observaciones}
                  onChange={(e) => setObservaciones(e.target.value)}
                  rows={2}
                  disabled={causando}
                  placeholder="Notas internas (opcional)"
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }}
                />
              </div>
            </div>

            {error && (
              <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#991b1b", marginBottom: 12 }}>{error}</div>
            )}

            <button
              onClick={handleCausar}
              disabled={!credentials?.has_erp_key || causando || !tercero || !cuenta}
              style={{
                width: "100%", padding: 12, borderRadius: 10, border: "none",
                background: !credentials?.has_erp_key || causando || !tercero || !cuenta ? "#94a3b8" : "#0f172a",
                color: "#fff", fontSize: 13, fontWeight: 700,
                cursor: !credentials?.has_erp_key || causando || !tercero || !cuenta ? "not-allowed" : "pointer"
              }}
            >
              {causando ? "Causando..." : "✓ Causar factura en " + (session.software_contable || "ERP")}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
// ⭐ DASHBOARD STATS — Separado en aprobadas y rechazadas
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function computeDashboardStats(facturas) {
  const F = facturas || [];

  // ─── Filtros ───
  const aprobadasArr = F.filter(f =>
    f.estado === "APROBADA" ||
    f.estado === "APROBADA_AUTOMATICAMENTE" ||
    f.estado === "CAUSADA"
  );
  const rechazadasArr = F.filter(f =>
    f.estado === "RECHAZADA_DIAN" ||
    f.estado === "RECHAZADA_INTERNA" ||
    f.estado === "RECHAZO_FALLIDO"
  );

  // ─── Stats aprobadas ───
  const totalAprobadas = aprobadasArr.length;
  const causadas = F.filter(f => f.estado === "CAUSADA").length;
  const pendientesCausacion = F.filter(f =>
    f.estado === "APROBADA" || f.estado === "APROBADA_AUTOMATICAMENTE"
  ).length;
  const totalMontoAprobadas = aprobadasArr.reduce((s, f) => s + (Number(f.total) || 0), 0);
  const totalCausado = F.filter(f => f.estado === "CAUSADA").reduce((s, f) => s + (Number(f.total) || 0), 0);

  // ─── Stats rechazadas ───
  const totalRechazadas = rechazadasArr.length;
  const rechazadasDian = F.filter(f => f.estado === "RECHAZADA_DIAN").length;
  const rechazadasInternas = F.filter(f => f.estado === "RECHAZADA_INTERNA").length;
  const rechazosFallidos = F.filter(f => f.estado === "RECHAZO_FALLIDO").length;
  const montoRechazado = rechazadasArr.reduce((s, f) => s + (Number(f.total) || 0), 0);

  // ─── Charts solo de aprobadas ───
  // Por mes (últimos 6 meses)
  const byMonth = {};
  aprobadasArr.forEach(f => {
    const d = dateFromInv(f);
    if (!d) return;
    const key = monthLabel(d);
    if (!byMonth[key]) byMonth[key] = { mes: key, facturas: 0, monto: 0, _date: d.getTime() };
    byMonth[key].facturas += 1;
    byMonth[key].monto += Number(f.total) || 0;
  });
  const monthly = Object.values(byMonth).sort((a, b) => a._date - b._date).slice(-6);

  // Por categoría
  const byCategoria = {};
  aprobadasArr.forEach(f => {
    const k = f.categoria || "Sin categoría";
    byCategoria[k] = (byCategoria[k] || 0) + (Number(f.total) || 0);
  });
  const categorias = Object.entries(byCategoria).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);

  // Top emisores
  const byEmisor = {};
  aprobadasArr.forEach(f => {
    const k = f.emisor || "—";
    if (!byEmisor[k]) byEmisor[k] = { emisor: k, count: 0, monto: 0 };
    byEmisor[k].count += 1;
    byEmisor[k].monto += Number(f.total) || 0;
  });
  const topEmisores = Object.values(byEmisor).sort((a, b) => b.monto - a.monto).slice(0, 5);

  // Por riesgo (solo aprobadas)
  const byRisk = { bajo: 0, medio: 0, alto: 0 };
  aprobadasArr.forEach(f => { if (byRisk[f.risk_level] !== undefined) byRisk[f.risk_level]++; });
  const riskData = [
    { name: "Bajo", value: byRisk.bajo, color: CHART_COLORS.risk_bajo },
    { name: "Medio", value: byRisk.medio, color: CHART_COLORS.risk_medio },
    { name: "Alto", value: byRisk.alto, color: CHART_COLORS.risk_alto },
  ].filter(x => x.value > 0);

  // ─── Chart de motivos de rechazo ───
  const byMotivo = {};
  rechazadasArr.forEach(f => {
    const k = f.motivo_rechazo || "Sin motivo";
    const label = motivoLabelByKey(k);
    if (!byMotivo[label]) byMotivo[label] = { motivo: label, count: 0, monto: 0 };
    byMotivo[label].count += 1;
    byMotivo[label].monto += Number(f.total) || 0;
  });
  const motivosRechazo = Object.values(byMotivo).sort((a, b) => b.count - a.count);

  return {
    // aprobadas
    totalAprobadas, causadas, pendientesCausacion, totalMontoAprobadas, totalCausado,
    monthly, categorias, topEmisores, riskData,
    // rechazadas
    totalRechazadas, rechazadasDian, rechazadasInternas, rechazosFallidos, montoRechazado,
    motivosRechazo,
  };
}

function AssistantChat({ session, authFetch, onClose, facturas }) {
  const [messages, setMessages] = useState([
    { role: "assistant", content: "Hola 👋 Soy tu asistente contable. Pregúntame sobre tus facturas, retenciones, riesgos o cualquier dato del dashboard." }
  ]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const scrollRef = useRef(null);

  // ⭐ Calcula stats del dashboard para enviar al backend como context
  const dashboardStats = useMemo(() => {
    const F = Array.isArray(facturas) ? facturas : [];
    const aprobadasArr = F.filter(f => f.estado === "APROBADA" || f.estado === "APROBADA_AUTOMATICAMENTE" || f.estado === "CAUSADA");
    const pendientes = F.filter(f => f.estado === "APROBADA" || f.estado === "APROBADA_AUTOMATICAMENTE").length;
    const causadas = F.filter(f => f.estado === "CAUSADA").length;
    const totalFacturado = aprobadasArr.reduce((s, f) => s + (Number(f.total) || 0), 0);
    const totalIva = aprobadasArr.reduce((s, f) => s + (Number(f.iva) || 0), 0);
    const totalRetefuente = aprobadasArr.reduce((s, f) => s + (Number(f.retefuente) || 0), 0);
    const totalReteiva = aprobadasArr.reduce((s, f) => s + (Number(f.reteiva) || 0), 0);
    const totalReteica = aprobadasArr.reduce((s, f) => s + (Number(f.reteica) || 0), 0);
    const totalRetenciones = totalRetefuente + totalReteiva + totalReteica;
    const totalNetoPagar = totalFacturado - totalRetenciones;
    const ticketPromedio = aprobadasArr.length > 0 ? totalFacturado / aprobadasArr.length : 0;
    const byEmisor = {};
    aprobadasArr.forEach(f => {
      const k = f.emisor || "—";
      if (!byEmisor[k]) byEmisor[k] = { emisor: k, emisor_nit: f.nit_emisor, count: 0, total: 0 };
      byEmisor[k].count += 1;
      byEmisor[k].total += Number(f.total) || 0;
    });
    const topProveedores = Object.values(byEmisor).sort((a, b) => b.total - a.total).slice(0, 10);
    const byCat = {};
    aprobadasArr.forEach(f => {
      const k = f.categoria || "Sin categoría";
      if (!byCat[k]) byCat[k] = { name: k, count: 0, value: 0 };
      byCat[k].count += 1;
      byCat[k].value += Number(f.total) || 0;
    });
    const categorias = Object.values(byCat).sort((a, b) => b.value - a.value);
    const byRisk = { bajo: 0, medio: 0, alto: 0 };
    const byRiskMonto = { bajo: 0, medio: 0, alto: 0 };
    aprobadasArr.forEach(f => {
      if (byRisk[f.risk_level] !== undefined) {
        byRisk[f.risk_level]++;
        byRiskMonto[f.risk_level] += Number(f.total) || 0;
      }
    });
    const riesgoData = [
      { name: "Bajo", count: byRisk.bajo, monto: byRiskMonto.bajo },
      { name: "Medio", count: byRisk.medio, monto: byRiskMonto.medio },
      { name: "Alto", count: byRisk.alto, monto: byRiskMonto.alto },
    ].filter(x => x.count > 0);
    return {
      count: aprobadasArr.length,
      count_aprobadas: aprobadasArr.length,
      count_pendientes: pendientes,
      count_causadas: causadas,
      totalFacturado, totalIva, totalNetoPagar, ticketPromedio,
      totalRetefuente, totalReteiva, totalReteica, totalRetenciones,
      topProveedores, categorias, riesgoData,
      periodo: { filtro_activo: false },
    };
  }, [facturas]);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  async function send(text) {
    const content = (text || input).trim();
    if (!content || sending) return;
    const newMsgs = [...messages, { role: "user", content }];
    setMessages(newMsgs);
    setInput("");
    setSending(true);
    try {
      const { data } = await authFetch(CONFIG.ASSISTANT_URL, {
        method: "POST",
        body: JSON.stringify({
          nit: session.nit,
          messages: newMsgs.map(m => ({ role: m.role, content: m.content })),
         context: {
            nit: session.nit,
            empresa: session.empresa,
            software_contable: session.software_contable,
            actividad: session.actividad,
            email: session.email,
            role: session.role,
            is_owner: session.is_owner,
            dashboardStats,
          }
        }),
      });
      setMessages([...newMsgs, { role: "assistant", content: data.reply || data.message || "Sin respuesta" }]);
    } catch (e) {
      if (e.message !== "SESSION_EXPIRED") {
        setMessages([...newMsgs, { role: "assistant", content: "❌ Error: " + e.message }]);
      }
    } finally {
      setSending(false);
    }
  }

  return (
    <div style={{
      position: "fixed", bottom: 90, right: 24,
      width: 380, maxWidth: "calc(100vw - 32px)",
      height: 540, maxHeight: "calc(100vh - 120px)",
      background: "#fff", borderRadius: 16, border: "1px solid #e2e8f0",
      boxShadow: "0 20px 60px rgba(0,0,0,0.18)",
      display: "flex", flexDirection: "column", overflow: "hidden",
      zIndex: 90
    }}>
      <div style={{ padding: "14px 18px", background: "linear-gradient(135deg, #0f172a, #1e293b)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 11, opacity: 0.7, letterSpacing: "0.1em" }}>ASISTENTE IA</div>
          <div style={{ fontSize: 14, fontWeight: 700 }}>💬 Chat contable</div>
        </div>
        <button onClick={onClose} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", borderRadius: 8, width: 28, height: 28, fontSize: 14, cursor: "pointer" }}>×</button>
      </div>

      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: 14, background: "#fafbfc" }}>
        {messages.map((m, i) => <AssistantMessage key={i} msg={m} />)}
        {messages.length === 1 && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, letterSpacing: "0.08em", marginBottom: 6 }}>SUGERENCIAS</div>
            {getQuickPrompts().map((p, i) => (
              <button key={i} onClick={() => send(p)} style={{ display: "block", width: "100%", textAlign: "left", padding: "8px 12px", margin: "4px 0", background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, fontSize: 12, cursor: "pointer", color: "#475569" }}>
                {p}
              </button>
            ))}
          </div>
        )}
        {sending && (
          <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 10 }}>
            <div style={{ background: "#f1f5f9", borderRadius: 14, padding: "10px 14px", fontSize: 13, color: "#64748b" }}>
              <span className="spin">⟳</span> Pensando...
            </div>
          </div>
        )}
      </div>

      <div style={{ borderTop: "1px solid #e2e8f0", padding: 12, background: "#fff", display: "flex", gap: 8 }}>
        <input
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="Pregunta algo sobre tus facturas..."
          disabled={sending}
          style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: "1px solid #e2e8f0", fontSize: 13, boxSizing: "border-box" }}
        />
        <button onClick={() => send()} disabled={sending || !input.trim()} style={{
          padding: "10px 16px", borderRadius: 10, border: "none",
          background: sending || !input.trim() ? "#94a3b8" : "#0f172a", color: "#fff",
          fontSize: 13, fontWeight: 700, cursor: sending || !input.trim() ? "not-allowed" : "pointer"
        }}>Enviar</button>
      </div>
    </div>
  );
}

// ⭐ FASE C — DELETION GRACE BANNER
// Muestra un banner amarillo en la parte superior del dashboard cuando la empresa
// está marcada para eliminación (deleted_at != NULL). Cuenta regresiva hasta hard_delete
// y botón "Cancelar eliminación" que llama al webhook empresa/cancel-deletion.
// 
// Props:
//   - deletedAt: ISO string del momento de la solicitud de eliminación (o null)
//   - graceDays: días de gracia configurados (default 30)
//   - onCancelled: callback tras cancelación exitosa (refresh state padre)
//   - authFetch: helper de auth heredado del Dashboard
//   - nit: NIT actual de la session
// ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════
function DeletionGraceBanner({ deletedAt, graceDays = 30, onCancelled, authFetch, nit }) {
  const [cancelling, setCancelling] = useState(false);
  const [error, setError] = useState("");
  if (!deletedAt) return null;
  // Calcular cuándo expira el período de gracia
  const deletedAtMs = new Date(deletedAt).getTime();
  const expiresAtMs = deletedAtMs + (graceDays * 24 * 60 * 60 * 1000);
  const nowMs = Date.now();
  const remainingMs = Math.max(0, expiresAtMs - nowMs);
  const remainingDays = Math.ceil(remainingMs / (24 * 60 * 60 * 1000));
  const remainingHours = Math.ceil(remainingMs / (60 * 60 * 1000));
  const expired = remainingMs === 0;
  const isLastDay = remainingDays <= 1 && !expired;
  // Texto del countdown
  let countdownText;
  if (expired) {
    countdownText = "Eliminación pendiente de procesar";
  } else if (isLastDay) {
    countdownText = `Eliminación en menos de ${remainingHours} hora${remainingHours !== 1 ? "s" : ""}`;
  } else {
    countdownText = `Eliminación en ${remainingDays} día${remainingDays !== 1 ? "s" : ""}`;
  }
  async function handleCancel() {
    if (!confirm(`¿Cancelar la eliminación de la empresa?\n\nLa empresa permanecerá activa con todos sus datos.`)) return;
    setCancelling(true);
    setError("");
    try {
      const { data } = await authFetch(CONFIG.EMPRESA_CANCEL_DELETION_URL, {
        method: "POST",
        body: JSON.stringify({ nit }),
      });
      if (data?.ok) {
        if (onCancelled) onCancelled();
      } else {
        setError(data?.message || "No se pudo cancelar la eliminación. Intenta de nuevo.");
      }
    } catch (e) {
      if (e.message !== "SESSION_EXPIRED") {
        setError(e.message || "Error de conexión.");
      }
    } finally {
      setCancelling(false);
    }
  }
  // Colores según urgencia
  const bgColor = expired ? "#fee2e2" : (isLastDay ? "#fed7aa" : "#fef3c7");
  const borderColor = expired ? "#fecaca" : (isLastDay ? "#fdba74" : "#fbbf24");
  const textColor = expired ? "#991b1b" : (isLastDay ? "#9a3412" : "#92400e");
  const icon = expired ? "🔴" : (isLastDay ? "🟠" : "⏳");
  return (
    <div className="fade-in" style={{
      background: bgColor,
      borderBottom: `2px solid ${borderColor}`,
      padding: "12px 24px",
      display: "flex",
      alignItems: "center",
      justifyContent: "space-between",
      gap: 16,
      flexWrap: "wrap",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, flex: 1, minWidth: 0 }}>
        <span style={{ fontSize: 20 }}>{icon}</span>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: textColor }}>
            Tu empresa está marcada para eliminación
          </div>
          <div style={{ fontSize: 11, color: textColor, marginTop: 2, opacity: 0.9 }}>
            {countdownText} · Solicitada {dateStr(deletedAt)}. Puedes cancelar antes de que expire.
          </div>
          {error && (
            <div style={{ fontSize: 11, color: "#991b1b", marginTop: 4, fontWeight: 600 }}>
              ⚠ {error}
            </div>
          )}
        </div>
      </div>
      <button
        onClick={handleCancel}
        disabled={cancelling || expired}
        style={{
          padding: "8px 16px",
          borderRadius: 8,
          border: "none",
          background: cancelling || expired ? "#94a3b8" : "#0f172a",
          color: "#fff",
          fontSize: 12,
          fontWeight: 700,
          cursor: cancelling || expired ? "not-allowed" : "pointer",
          fontFamily: "inherit",
          whiteSpace: "nowrap",
          flexShrink: 0,
        }}
      >
        {cancelling ? "Cancelando..." : (expired ? "Procesando..." : "✕ Cancelar eliminación")}
      </button>
    </div>
  );
}
